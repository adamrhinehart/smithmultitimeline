      {text:'Joseph Smith, History, 1838\u20131856, vol. C-1 [2 Nov. 1838\u201331 July 1842] \u2014 JS\'s manuscript history covering the settlement at Commerce and its renaming', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-c-1-2-november-1838-31-july-1842/1'}
    ], researchNotes:'The same volume is cited from the Personal Life entry on the family settling at Commerce. The founding was gradual \u2014 land purchases from spring 1839, with the name Nauvoo adopted over the following months \u2014 so the entry carries an approximate date rather than a single document date.'},
    {cat:'church', y:1841, m:4, d:6, title:'Nauvoo Temple cornerstone laid', people:[], desc:'Cornerstones are laid for a temple on the bluff at Nauvoo, in a public ceremony attended by the Nauvoo Legion and invited guests from around Hancock County.', sources:[
      {text:'Temple, Nauvoo, Hancock County, Illinois \u2014 Joseph Smith Papers place record, giving the cornerstone laying as 6 April 1841 and summarising construction', url:'https://www.josephsmithpapers.org/place/temple-nauvoo-illinois'},
      {text:'Revelation, 19 January 1841 [D&C 124] \u2014 the revelation commanding the temple, given some three months earlier', url:'https://www.josephsmithpapers.org/paper-summary/revelation-19-january-1841-dc-124/3'},
      {text:'"Celebration of the Anniversary of the Church," Times and Seasons, 15 Apr. 1841 \u2014 contemporary report of the ceremony'}
    ], researchNotes:'The ceremony was deliberately public: word was sent out by newspaper and letter, prominent people from around the county were invited, a stand was built for dignitaries, and the Nauvoo Legion formed a hollow square around the building\'s footprint. It was held on 6 April, the anniversary of the church\'s organization.\n\nThe third citation is given without a link because that newspaper page was not among the documents verified.'},
    {cat:'church', y:1842, m:3, d:17, title:'Relief Society founded', people:['Emma Hale Smith'], desc:'Twenty women meet in the room above JS\'s store at Nauvoo and are organized as the Female Relief Society of Nauvoo. Emma Hale Smith is elected president and selects two counselors \u2014 the first ecclesiastical positions held by women in the church.', sources:[
      {text:'Nauvoo Relief Society Minute Book, 17 March 1842 \u2014 minutes of the inaugural meeting', url:'https://www.josephsmithpapers.org/paper-summary/nauvoo-relief-society-minute-book/29'},
      {text:'Nauvoo Relief Society Minute Book \u2014 the volume itself, kept 17 Mar. 1842\u201316 Mar. 1844 in the handwriting of Eliza R. Snow, Phebe Bartholomew Wheeler, Hannah Ells and an unidentified scribe', url:'https://www.josephsmithpapers.org/paper-summary/nauvoo-relief-society-minute-book/3'}
    ], researchNotes:'The minute book was presented to the society by Willard Richards on 17 March 1842, the day of the first meeting, and opens with that meeting\'s minutes. The Joseph Smith Papers notes copying errors in the volume indicating the minutes were probably taken on loose pages and copied in afterwards, so the book is a fair copy rather than the original notes.\n\nJS told the women at that first meeting that "the minutes of your meetings will be precedents for you to act upon \u2014 your Constitution and law," and the Joseph Smith Papers describes these minutes as the only record of teachings he directed specifically to women.\n\nThe often-quoted description of the society being organized "under the priesthood after the pattern of the priesthood" comes from Sarah M. Kimball\'s autobiography, published in the Woman\'s Exponent on 1 September 1883 \u2014 forty-one years after the meeting.\n\nBy the last recorded meeting in March 1844, 1,331 women had enrolled.'},
    {cat:'church', y:1844, m:8, d:8, title:'Succession crisis begins', people:['Brigham Young','Sidney Rigdon'], desc:'In the weeks after JS\'s death, competing claims to lead the church are put to the Saints at Nauvoo, most prominently by Sidney Rigdon and by Brigham Young on behalf of the Quorum of the Twelve.', sources:[
      {text:'Sidney Rigdon, Joseph Smith Papers biography \u2014 documents his claim to lead the church after JS\'s death and his subsequent excommunication in 1844', url:'https://www.josephsmithpapers.org/person/sidney-rigdon'},
      {text:'Brigham Young, Joseph Smith Papers biography \u2014 documents his role as president of the Quorum of the Twelve at JS\'s death', url:'https://www.josephsmithpapers.org/person/brigham-young'},
      {text:'Thomas Bullock, shorthand notes of the morning meeting of 8 August 1844, transcribed and published as "Sidney Rigdon\'s Plea to the Saints," BYU Studies Quarterly 53, no. 2 (2014): 121\u2013139'}
    ], researchNotes:'This entry sits at the edge of the Joseph Smith Papers\' scope, which is built around JS\'s own documents and therefore largely ends at his death on 27 June 1844. The two citations above are its biographical records rather than documents of the succession meetings themselves; sourcing this period properly requires other repositories.\n\nDate made specific to 8 August 1844, the day of the meetings at which the competing claims were put to the assembled Saints, where the entry previously carried an approximate August. The fullest contemporary record of the morning meeting is Thomas Bullock\'s shorthand, which was not transcribed and published until 2014; the third citation is given without a link because that publication was not among the documents verified.'},

    // ---- Local & Regional Events ----
    {cat:'local', y:1816, approx:true, title:'"Year Without a Summer"', people:[], desc:'Aerosols from the 1815 eruption of Mount Tambora in Indonesia cool the global climate. Frost and snow persist through the summer across New England and New York, crops fail, and grain prices soar \u2014 driving migration westward.', sources:[
      {text:'"1816 \u2014 The Year Without Summer," U.S. National Park Service \u2014 summarises the Tambora eruption and its documented effects across the northeastern states', url:'https://www.nps.gov/articles/000/1816-the-year-without-summer.htm'}
    ], researchNotes:'Outside the Joseph Smith Papers\' subject matter, so sourced to a federal agency summary rather than a primary document. The NPS account records May frost killing crops in New York, Massachusetts, New Hampshire and Vermont, June snow at Albany, and frost persisting into late August in Virginia.\n\nThis entry is the context for the Personal Life entry on the Smith family\'s move to western New York: crop failure and debt following this season are given there as the reason for the move.'},
    {cat:'local', y:1817, m:7, d:4, title:'Erie Canal construction begins', people:[], desc:'Ground is broken at Rome, New York for a canal to link the Great Lakes at Buffalo with the Hudson at Albany. Construction draws labour and commerce through the region of western New York later called the "Burned-over District."', sources:[
      {text:'"Opening of the Erie Canal," Library of Congress research guide \u2014 covers the canal\'s construction and 1825 opening', url:'https://guides.loc.gov/this-month-in-business-history/october/opening-erie-canal'}
    ], researchNotes:'Date made specific to 4 July 1817, the groundbreaking at Rome, New York, where the entry previously carried an approximate 1817.\n\nOutside the Joseph Smith Papers\' subject matter and sourced to a Library of Congress research guide rather than a primary document. A stronger primary source \u2014 New York State canal commission records, or contemporary newspaper coverage \u2014 would be an improvement if this entry is revisited.'},
    {cat:'local', y:1820, approx:true, title:'Second Great Awakening intensifies', people:[], desc:'Waves of Protestant revivalism move through western New York, with competing Methodist, Baptist and Presbyterian preaching drawing large numbers in the Palmyra region.', sources:[
      {text:'Joseph Smith, History, 1838\u20131856, vol. A-1, pp. 2\u20133 \u2014 describes "an unusual excitement on the subject of religion" in the neighbourhood and the competition between denominations', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/2'}
    ], researchNotes:'This is a regional religious movement spanning years rather than a dated event, so the 1820 date marks the period of greatest local intensity as described in the sources rather than a specific occurrence.\n\nThe citation is a retrospective account written from 1838 onward, by a participant in the events it describes and one with an interest in them. Independent corroboration of revival activity in the Palmyra area in this period exists in local newspaper and denominational records, which are not cited here; adding one would strengthen the entry.'},
    {cat:'local', y:1825, m:10, d:26, title:'Erie Canal completed', people:[], desc:'The canal opens along its full 363 miles, Governor DeWitt Clinton travelling from Buffalo aboard the Seneca Chief. Transport costs collapse, accelerating settlement, commerce and the movement of ideas along its route.', sources:[
      {text:'"Opening of the Erie Canal," Library of Congress research guide \u2014 covers the 26 October 1825 opening and its economic effects', url:'https://guides.loc.gov/this-month-in-business-history/october/opening-erie-canal'}
    ], researchNotes:'Date made specific to 26 October 1825, where the entry previously carried an approximate 1825. Outside the Joseph Smith Papers\' subject matter and sourced to a Library of Congress research guide rather than a primary document.'},
    {cat:'local', y:1833, m:11, d:4, title:'Mob violence in Jackson County, Missouri', people:[], desc:'Armed conflict between settlers and church members culminates in the expulsion of the Saints from Jackson County, most crossing the Missouri River into Clay County.', sources:[
      {text:'Parley P. Pratt et al., "\u2018The Mormons\u2019 So Called," The Evening and the Morning Star, Extra, Feb. 1834 \u2014 a contemporary published account of the expulsion', url:'https://www.josephsmithpapers.org/paper-summary/parley-p-pratt-et-al-the-mormons-so-called-12-december-1833'},
      {text:'Revelation, 16\u201317 December 1833 [D&C 101] \u2014 dictated in response to news of the expulsion', url:'https://www.josephsmithpapers.org/paper-summary/revelation-16-17-december-1833-dc-101'}
    ], researchNotes:'The first citation is a published account written by participants on the church\'s side, within months of the events, and printed in the church\'s own newspaper. It is contemporary but partisan; accounts from the other side of the conflict exist in Missouri county and newspaper records and are not cited here.'},
    {cat:'local', y:1837, m:5, approx:true, title:'Panic of 1837', people:[], desc:'New York banks suspend specie payments in May 1837, triggering a national financial crisis and a prolonged depression that bankrupted roughly a third of the states \u2014 and that contributed directly to the collapse of the Kirtland Safety Society.', sources:[
      {text:'Specie Circular, executive order of President Andrew Jackson, 11 July 1836 \u2014 required payment in specie for public land purchases, one of the immediate precipitants'},
      {text:'Introduction to the Kirtland Safety Society \u2014 the Joseph Smith Papers account of the society\'s failure, which situates it against the wider financial crisis', url:'https://www.josephsmithpapers.org/paper-summary/introduction-to-the-kirtland-safety-society/1'}
    ], researchNotes:'Outside the Joseph Smith Papers\' subject matter except where it bears on Kirtland. The first citation is given without a link because that document was not among those verified; a financial-history repository such as FRASER at the Federal Reserve Bank of St. Louis would be the natural place to source this entry properly.\n\nThe usual account of the crisis assigns it several causes at once \u2014 the Specie Circular, the Deposit Act of 1836, the expiry of the Second Bank of the United States, and tightening British monetary policy \u2014 rather than any single trigger.'},
    {cat:'local', y:1838, m:10, d:27, title:'Missouri "Extermination Order"', people:['Lilburn Boggs'], desc:'Governor Lilburn Boggs issues Executive Order 44, directing General John B. Clark that "the Mormons must be treated as enemies, and must be exterminated or driven from the State if necessary for the public peace."', sources:[
      {text:'Lilburn W. Boggs, Executive Order 44, 27 October 1838 \u2014 digitised scan of the order; the original is held by the Missouri State Archives', url:'https://archive.org/details/BoggsExterminationOrder44'}
    ], researchNotes:'A state government document rather than a church one, which is why it sits in this category; the resulting expulsion is recorded separately under Church History.\n\nThe order was issued three days after the Battle of Crooked River and, per the accounts, on the basis of reports of that engagement and of rumoured Mormon military plans. It was formally rescinded by Governor Christopher S. Bond on 25 June 1976, nearly 138 years later.\n\nThe citation links to a digitised scan rather than to the Missouri State Archives\' own catalogue record; a direct archival citation would be preferable if this entry is revisited.'},
    {cat:'local', y:1838, m:10, d:30, title:'Haun\'s Mill Massacre', people:[], desc:'Three days after the extermination order, a Missouri militia company attacks the small settlement at Haun\'s Mill on Shoal Creek, killing seventeen and wounding others; some of the dead were placed in an unfinished well.', sources:[
      {text:'Joseph Smith, History, 1838\u20131856, vol. B-1 [1 Sept. 1834\u20132 Nov. 1838] \u2014 JS\'s manuscript history covering the Missouri conflict through the events of late October 1838', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-b-1-1-september-1834-2-november-1838/1'}
    ], researchNotes:'The documentary record for this event consists largely of survivor affidavits and later petitions to the federal government, collected in the 1839\u201340 Missouri redress petitions, together with Missouri militia correspondence. None of that material is cited here directly, and the single citation given is a retrospective church history rather than a contemporary account of the attack itself. This entry would benefit most from further sourcing of any in this category.'},
    {cat:'local', y:1839, m:12, approx:true, title:'Illinois politicians court the new settlers', people:[], desc:'Both Whigs and Democrats in Illinois compete for the support of the Saints arriving from Missouri, laying the political groundwork for the unusually broad city charter granted a year later.', sources:[
      {text:'Act to Incorporate the City of Nauvoo, 16 December 1840 \u2014 the resulting charter; the Joseph Smith Papers notes it drew overwhelming support from both parties, each interested in courting the Mormon vote', url:'https://www.josephsmithpapers.org/paper-summary/act-to-incorporate-the-city-of-nauvoo-16-december-1840/4'}
    ], researchNotes:'Retitled from "Commerce granted city charter groundwork," which implied a charter action in 1839; no charter was granted that year. What the entry describes is the political courtship preceding the December 1840 act.\n\nThis entry overlaps substantially with the charter entry that follows it and is thinly evidenced on its own \u2014 the date is approximate and no document marks it. Worth considering whether it should be merged into the charter entry, the reverse of the split applied to baptism for the dead.'},
    {cat:'local', y:1840, m:12, d:16, title:'Nauvoo city charter enacted', people:[], desc:'The Illinois legislature incorporates the City of Nauvoo, granting it a city council, its own militia (the Nauvoo Legion), a university, and a municipal court with the power to issue writs of habeas corpus. The charter took effect in February 1841.', sources:[
      {text:'Act to Incorporate the City of Nauvoo, 16 December 1840 \u2014 the charter as enacted; printed in the Times and Seasons, 15 Jan. 1841', url:'https://www.josephsmithpapers.org/paper-summary/act-to-incorporate-the-city-of-nauvoo-16-december-1840/4'}
    ], researchNotes:'Date corrected from 16 December 1841 to 16 December 1840 \u2014 the year had been transposed. The Joseph Smith Papers dates the act to 16 December 1840, with the charter taking effect in February 1841. The entry was retitled from "in effect" to "enacted" to match the date now given; if the effective date is preferred, it would be February 1841.\n\nThe habeas corpus power granted to the municipal court became consequential later, as it was used to resist attempts to extradite JS to Missouri.'},
    {cat:'local', y:1844, m:6, d:7, title:'Nauvoo Expositor published and destroyed', people:['William Law'], desc:'Dissidents led by William Law publish a single issue of the Nauvoo Expositor criticising JS; the city council declares it a public nuisance and the press is destroyed three days later, igniting regional outrage and leading directly to JS\'s arrest.', sources:[
      {text:'William Law, Joseph Smith Papers biography \u2014 documents his April 1844 excommunication and his role in publishing the Nauvoo Expositor', url:'https://www.josephsmithpapers.org/person/william-law'}
    ], researchNotes:'The entry date of 7 June 1844 is the date of publication; the destruction of the press followed on 10 June by order of the city council, so this entry currently compresses two dates three days apart.\n\nThe citation is a biographical record rather than the documents themselves \u2014 the Expositor issue, the city council minutes declaring it a nuisance, and the resulting legal proceedings all exist and would be stronger citations. The same biography is cited from the Acquaintances entry on Law\'s break with JS.'},
    {cat:'local', y:1846, m:2, approx:true, title:'Mass exodus from Nauvoo begins', people:['Brigham Young'], desc:'Facing renewed hostility and the repeal of the city charter, the Saints begin crossing the Mississippi in February 1846 to leave Illinois, travelling west under Brigham Young\'s leadership.', sources:[
      {text:'Brigham Young, Joseph Smith Papers biography — documents his leadership of the church following JS\'s death and the westward migration', url:'https://www.josephsmithpapers.org/person/brigham-young'}
    ], researchNotes:'This event falls outside the Joseph Smith Papers\' scope, which is organised around JS\'s own documents and largely ends at his death in June 1844, so only a biographical record is cited. The primary records for the exodus — Brigham Young\'s office papers, the Camp of Israel journals, and the trail records — sit in other collections.\n\nDate made specific to February 1846, when the first companies crossed the Mississippi, where the entry previously carried only the year.'}
  ];

  var STORAGE_KEY = 'js_timeline_data_v1';
  var ADMIN_SESSION_KEY = 'js_timeline_admin_v1';

  // NOTE ON SECURITY: this is a client-side-only file with no server, so this
  // is a courtesy lock (keeps casual visitors from editing), not real access
  // control — anyone who opens the page source can find this constant. Change
  // it to whatever you like before sharing the file with your researchers.
  var ADMIN_PASSWORD = 'smith1844';

  // ---- Issue reporting ----
  // SET THIS before sharing the file. Submitting a report opens the visitor's
  // own email program with the message pre-filled addressed here; nothing is
  // transmitted by the page itself.
  // Worth considering: an address placed in a publicly shared HTML file can be
  // harvested by spam scrapers, so a dedicated or alias address is safer than a
  // primary personal one.
  var REPORT_EMAIL = 'you@example.com';

  // Each category carries two labels: `short` goes in the email subject line so
  // reports stay scannable and sortable in an inbox, while `label` is the fuller
  // description shown in the dropdown.
  var FLAG_CATEGORIES = [
    {short:'Date questioned',    label:'Date questioned — event or recorded date looks wrong'},
    {short:'Source problem',     label:'Source problem — missing, broken link, or does not support the claim'},
    {short:'Factual error',      label:'Factual error — in the title or notes'},
    {short:'Neutrality concern', label:'Neutrality concern — directive or judging language'},
    {short:'Missing context',    label:'Missing context — something important omitted'},
    {short:'Duplicate entry',    label:'Duplicate entry'},
    {short:'Technical problem',  label:'Display or technical problem'},
    {short:'Other',              label:'Other'}
  ];

  // Migrates old single source/sourceUrl fields into the newer sources[] array,
  // so existing saved boards and JSON exports keep working.
  function normalizeEntry(e){
    if(!e.sources){
      e.sources = [];
      if(e.source || e.sourceUrl){
        e.sources.push({text: e.source || '', url: e.sourceUrl || ''});
      }
    }
    delete e.source;
    delete e.sourceUrl;
    if(!Array.isArray(e.themes)) e.themes = [];
    return e;
  }

  // Short, stable reference codes (ID-001, ID-002, ...) for pointing at a
  // specific data point without spelling out its title — handy for a future
  // backend, but also just for talking about "ID-014" instead of a long name.
  // Numbers are never reused, even if that entry is later deleted, so a
  // reference stays meaningful once it's been assigned.
  function formatRefId(n){
    var s = String(n);
    while(s.length < 3) s = '0' + s;
    return 'ID-' + s;
  }
  function ensureRefIds(st){
    if(typeof st.nextRefId !== 'number' || isNaN(st.nextRefId)) st.nextRefId = 1;
    var maxSeen = 0;
    st.entries.forEach(function(e){
      if(e.refId){
        var m = /ID-(\d+)/.exec(e.refId);
        if(m){ var n = parseInt(m[1], 10); if(n > maxSeen) maxSeen = n; }
      }
    });
    if(st.nextRefId <= maxSeen) st.nextRefId = maxSeen + 1;
    st.entries.forEach(function(e){
      if(!e.refId){
        e.refId = formatRefId(st.nextRefId);
        st.nextRefId++;
      }
    });
    return st;
  }

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && parsed.categories && parsed.entries){
          parsed.entries.forEach(normalizeEntry);
          ensureRefIds(parsed);
          // Back-compat: boards saved before themes existed won't have this key.
          if(!Array.isArray(parsed.themes)) parsed.themes = DEFAULT_THEMES.slice();
          return parsed;
        }
      }
    }catch(e){}
    // Build fresh from defaults
    var entries = DEFAULT_ENTRIES.map(function(e, i){
      return normalizeEntry(Object.assign({id:'seed-'+i}, e));
    });
    return ensureRefIds({categories: DEFAULT_CATEGORIES.slice(), themes: DEFAULT_THEMES.slice(), entries: entries});
  }

  var state = loadState();
  var uiState = {
    collapsedCats: {},
    search: '',
    person: '',
    theme: '',
    zoom: 80,
    selectedId: null,
    nearbyMonths: 2,
    threadOn: false,
    positionBy: 'event',
    // Visitor's own on-screen column order — anyone can drag columns to
    // rearrange them for their own navigation. Intentionally NOT saved to
    // board state/localStorage, so it resets to the default order on refresh.
    colOrder: null
  };
  var dragCatId = null;
  var isAdmin = (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1');

  /* ============================= FOCUS WORKSPACE ============================= */
  // A personal, local workspace — pin entries here to build your own thread or
  // theory. This never touches the shared board data, so it's available to
  // every visitor, admin or not. Stored separately from the board's dataset.

  var FOCUS_STORAGE_KEY = 'js_timeline_focus_v1';
  var dragFocusEntryId = null;

  function loadFocusState(){
    try{
      var raw = localStorage.getItem(FOCUS_STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.ids)){
          return {
            title: parsed.title || '',
            notes: parsed.notes || '',
            ids: parsed.ids,
            open: !!parsed.open
          };
        }
      }
    }catch(e){}
    return {title:'', notes:'', ids:[], open:false};
  }
  var focusState = loadFocusState();
  function saveFocusState(){
    localStorage.setItem(FOCUS_STORAGE_KEY, JSON.stringify(focusState));
  }

  function isPinned(id){ return focusState.ids.indexOf(id) !== -1; }

  function addToFocus(id){
    if(!isPinned(id)){
      focusState.ids.push(id);
      saveFocusState();
      renderFocusList();
      render();
    }
  }
  function removeFromFocus(id){
    var i = focusState.ids.indexOf(id);
    if(i !== -1){
      focusState.ids.splice(i, 1);
      saveFocusState();
      renderFocusList();
      render();
    }
  }
  function toggleFocus(id){ isPinned(id) ? removeFromFocus(id) : addToFocus(id); }
  function clearFocus(){
    if(!focusState.ids.length) return;
    if(confirm('Clear all pinned entries from your Focus panel? This only clears your workspace — no board data is affected.')){
      focusState.ids = [];
      saveFocusState();
      renderFocusList();
      render();
    }
  }

  function sortedFocusEntries(){
    return focusState.ids
      .map(function(id){ return state.entries.find(function(e){ return e.id === id; }); })
      .filter(Boolean)
      .sort(function(a,b){
        var fa = fracYear(a), fb = fracYear(b);
        if(fa !== fb) return fa - fb;
        return a.title.localeCompare(b.title);
      });
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function nextColor(){
    var used = state.categories.map(function(c){return c.color;});
    for(var i=0;i<DEFAULT_PALETTE.length;i++){
      if(used.indexOf(DEFAULT_PALETTE[i]) === -1) return DEFAULT_PALETTE[i];
    }
    return DEFAULT_PALETTE[used.length % DEFAULT_PALETTE.length];
  }

  function nextThemeColor(){
    var used = state.themes.map(function(t){return t.color;});
    for(var i=0;i<DEFAULT_PALETTE.length;i++){
      if(used.indexOf(DEFAULT_PALETTE[i]) === -1) return DEFAULT_PALETTE[i];
    }
    return DEFAULT_PALETTE[used.length % DEFAULT_PALETTE.length];
  }

  function genId(prefix){
    return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,7);
  }

  function catById(id){
    for(var i=0;i<state.categories.length;i++) if(state.categories[i].id===id) return state.categories[i];
    return null;
  }

  // Display order for columns: the visitor's own drag-to-reorder (uiState.colOrder)
  // takes precedence over the board's underlying category order, but only for
  // categories it still knows about — anything newly added/removed by an admin
  // since the visitor last dragged just falls back to the board's own order.
  function orderedCategories(){
    if(!uiState.colOrder) return state.categories.slice();
    var remaining = {};
    state.categories.forEach(function(c){ remaining[c.id] = c; });
    var result = [];
    uiState.colOrder.forEach(function(id){
      if(remaining[id]){ result.push(remaining[id]); delete remaining[id]; }
    });
    state.categories.forEach(function(c){
      if(remaining[c.id]) result.push(c);
    });
    return result;
  }

  function themeById(id){
    for(var i=0;i<(state.themes||[]).length;i++) if(state.themes[i].id===id) return state.themes[i];
    return null;
  }

  // Relative luminance (WCAG), used to decide what to print on a category color.
  function relLuminance(hex){
    var h = String(hex || '').replace('#','');
    if(h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if(!/^[0-9a-f]{6}$/i.test(h)) return 0;
    function chan(v){
      v = parseInt(v, 16) / 255;
      return v <= 0.03928 ? v/12.92 : Math.pow((v + 0.055)/1.055, 2.4);
    }
    return 0.2126*chan(h.slice(0,2)) + 0.7152*chan(h.slice(2,4)) + 0.0722*chan(h.slice(4,6));
  }

  // Cream on dark colors, ink on light ones. The five default categories are all
  // dark enough for cream, but category colors are editable via a color picker,
  // so a pale choice must not leave the title unreadable. The 0.197 threshold is
  // where cream and ink give equal contrast against the same background.
  function readableOn(hex){
    return relLuminance(hex) > 0.197 ? '#2A2420' : '#F3ECDA';
  }

  function fracYear(e){
    var y = e.y;
    var m = e.m ? (e.m-1)/12 : 0.5;
    var d = e.d ? (e.d-1)/365 : 0;
    return y + m + d;
  }

  function dateLabel(e){
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var s = '';
    if(e.d && e.m) s = months[e.m-1] + ' ' + e.d + ', ' + e.y;
    else if(e.m) s = months[e.m-1] + ' ' + e.y;
    else s = String(e.y);
    if(e.approx) s = 'c. ' + s;
    return s;
  }

  // A "recorded date" is when an account was first written down or told —
  // distinct from the date of the event itself. Many recollections
  // (e.g. priesthood restoration accounts) were set down years after the fact.
  function hasRecordedDate(e){ return e.recordedY !== undefined && e.recordedY !== null; }
  function recordedFracYear(e){ return fracYear({y: e.recordedY, m: e.recordedM, d: e.recordedD}); }
  function recordedDateLabel(e){ return dateLabel({y: e.recordedY, m: e.recordedM, d: e.recordedD, approx: e.recordedApprox}); }
  function isRetrospective(e){ return hasRecordedDate(e) && (recordedFracYear(e) - fracYear(e) > 0.4); }
  // Which date actually places the card on the board, honoring the "Position by" toggle.
  function positionFracYear(e){
    if(uiState.positionBy === 'recorded' && hasRecordedDate(e)) return recordedFracYear(e);
    return fracYear(e);
  }

  /* ============================= RENDER ============================= */

  var boardInner = document.getElementById('board-inner');
  var rail = document.getElementById('rail');
  var PADDING_TOP = 40;
  var PADDING_BOTTOM = 60;

  function minMaxYear(){
    var min = Infinity, max = -Infinity;
    state.entries.forEach(function(e){
      if(e.y < min) min = e.y;
      if(e.y > max) max = e.y;
      if(hasRecordedDate(e)){
        if(e.recordedY < min) min = e.recordedY;
        if(e.recordedY > max) max = e.recordedY;
      }
    });
    if(!isFinite(min)){ min = 1800; max = 1850; }
    return {min: Math.floor(min)-1, max: Math.ceil(max)+1};
  }

  function yFor(fy, bounds, pxPerYear){
    return PADDING_TOP + (fy - bounds.min) * pxPerYear;
  }

  function totalHeight(bounds, pxPerYear){
    return PADDING_TOP + (bounds.max - bounds.min) * pxPerYear + PADDING_BOTTOM;
  }

  function matchesFilters(e){
    var s = uiState.search.trim().toLowerCase();
    if(s){
      var sourceText = (e.sources||[]).map(function(s){ return s.text+' '+s.url; }).join(' ');
      var hay = (e.title+' '+(e.desc||'')+' '+(e.researchNotes||'')+' '+(e.people||[]).join(' ')+' '+sourceText).toLowerCase();
      if(hay.indexOf(s) === -1) return false;
    }
    if(uiState.person){
      if(!(e.people||[]).includes(uiState.person)) return false;
    }
    if(uiState.theme){
      if(!(e.themes||[]).includes(uiState.theme)) return false;
    }
    return true;
  }

  function allPeople(){
    var set = {};
    state.entries.forEach(function(e){ (e.people||[]).forEach(function(p){ set[p]=true; }); });
    return Object.keys(set).sort();
  }

  function render(){
    var bounds = minMaxYear();
    var pxPerYear = uiState.zoom;
    var th = totalHeight(bounds, pxPerYear);

    // Rail
    rail.innerHTML = '';
    rail.style.height = th + 'px';
    for(var yr = bounds.min; yr <= bounds.max; yr++){
      var major = (yr % 5 === 0);
      var mark = document.createElement('div');
      mark.className = 'year-mark' + (major ? ' major' : '');
      mark.style.top = yFor(yr, bounds, pxPerYear) + 'px';
      mark.textContent = (major || pxPerYear >= 60) ? yr : (yr % 5 === 0 ? yr : '');
      if(!major && pxPerYear < 55) mark.textContent = '';
      rail.appendChild(mark);
    }

    // Clear old columns + gridlines + svg
    Array.prototype.slice.call(boardInner.querySelectorAll('.column, .gridline, #thread-svg')).forEach(function(n){ n.remove(); });

    // Every category gets a column; collapsing narrows one to a 40px strip
    // rather than removing it, so nothing ever disappears from the board.
    var visibleCats = orderedCategories();
    var totalColW = visibleCats.reduce(function(sum, c){ return sum + (uiState.collapsedCats[c.id] ? 40 : 258); }, 0);

    // Gridlines (behind columns, spans full width)
    for(var yr2 = bounds.min; yr2 <= bounds.max; yr2++){
      var g = document.createElement('div');
      g.className = 'gridline' + (yr2 % 5 === 0 ? ' major' : '');
      g.style.top = yFor(yr2, bounds, pxPerYear) + 'px';
      g.style.width = totalColW + 'px';
      boardInner.appendChild(g);
    }

    // Columns
    visibleCats.forEach(function(cat){
      var isCollapsed = !!uiState.collapsedCats[cat.id];
      var col = document.createElement('div');
      col.className = 'column' + (isCollapsed ? ' collapsed' : '');
      col.style.height = th + 'px';
      col.style.setProperty('--cat-color', cat.color);
      col.dataset.catId = cat.id;

      var header = document.createElement('div');
      header.className = 'column-header';
      header.style.setProperty('--cat-color', cat.color);
      // Collapsed headers hold rotated (writing-mode: vertical-rl) text, and a
      // few browsers fail to paint that rotated text at all when its container
      // is also natively draggable — so dragging is only enabled while expanded.
      // (You can still reorder a collapsed column: expand it, drag, re-collapse.)
      header.draggable = !isCollapsed;
      var catEntries = state.entries.filter(function(e){ return e.cat === cat.id; });
      header.innerHTML =
        '<div class="name">'+(isCollapsed ? '' : '<span class="drag-handle" title="Drag to reorder — resets on refresh">&#8942;&#8942;</span>')+'<span class="sw" style="background:'+cat.color+'"></span><span class="cat-label">'+escapeHtml(cat.name)+'</span></div>'+
        '<div class="meta-row">'+
        '<span class="col-controls">'+
          '<button class="collapse-btn" data-collapse="'+cat.id+'" title="'+(isCollapsed?'Expand':'Collapse')+'">'+(isCollapsed?'&#9656;':'&#9666;')+'</button>'+
          (isAdmin ? '<button class="subtle add-in-col" data-cat="'+cat.id+'">+ add</button>' : '')+
        '</span></div>';
      col.appendChild(header);

      if(isCollapsed){
        header.addEventListener('click', function(ev){
          if(ev.target.closest('.collapse-btn')) return;
          uiState.collapsedCats[cat.id] = false;
          render();
        });
      }

      header.querySelector('.collapse-btn').addEventListener('click', function(ev){
        ev.stopPropagation();
        var id = ev.currentTarget.dataset.collapse;
        uiState.collapsedCats[id] = !uiState.collapsedCats[id];
        render();
      });

      if(catEntries.length === 0){
        var msg = document.createElement('div');
        msg.className = 'empty-col-msg';
        msg.textContent = 'No entries yet.';
        col.appendChild(msg);
      }

      catEntries.forEach(function(e){
        var card = document.createElement('div');
        card.className = 'entry-card' + (isPinned(e.id) ? ' in-focus' : '');
        card.dataset.id = e.id;
        card.draggable = true;
        var fy = positionFracYear(e);
        card.style.top = yFor(fy, bounds, pxPerYear) + 'px';
        card.style.setProperty('--cat-color', cat.color);
        if(!matchesFilters(e)) card.classList.add('dimmed');
        if(e.id === uiState.selectedId) card.classList.add('selected');
        var retroBadge = isRetrospective(e) ? '<span class="retro-mark" title="Recorded later, as a retrospective account — see details">R</span>' : '';
        var dateShown = (uiState.positionBy === 'recorded' && hasRecordedDate(e)) ? ('Recorded '+recordedDateLabel(e)) : dateLabel(e);
        var pinned = isPinned(e.id);
        card.innerHTML = '<button type="button" class="pin-btn'+(pinned?' pinned':'')+'" data-id="'+e.id+'" title="'+(pinned?'Remove from Focus':'Add to Focus')+'">'+(pinned?'&#10003;':'&#9758;')+'</button>'+
          '<div class="date-line">'+dateShown+retroBadge+'</div><div class="title-line">'+escapeHtml(e.title)+'</div>';
        card.addEventListener('click', function(ev){
          if(ev.target.closest('.pin-btn')) return;
          var id = ev.currentTarget.dataset.id;
          openDetail(id);
        });
        card.querySelector('.pin-btn').addEventListener('click', function(ev){
          ev.stopPropagation();
          toggleFocus(ev.currentTarget.dataset.id);
        });
        card.addEventListener('dragstart', function(ev){
          dragFocusEntryId = e.id;
          ev.dataTransfer.effectAllowed = 'copy';
          try{ ev.dataTransfer.setData('text/plain', e.id); }catch(err){}
        });
        card.addEventListener('dragend', function(){
          dragFocusEntryId = null;
          var panel = document.getElementById('focusPanel');
          if(panel) panel.classList.remove('drag-over');
        });
        col.appendChild(card);
      });

      // Drag-and-drop reordering — a viewing convenience open to every visitor.
      // It only ever touches uiState.colOrder (never state.categories), so it's
      // never saved and resets to the board's default order on refresh.
      header.addEventListener('dragstart', function(ev){
        dragCatId = cat.id;
        col.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        try{ ev.dataTransfer.setData('text/plain', cat.id); }catch(e){}
      });
      header.addEventListener('dragend', function(){
        col.classList.remove('dragging');
        document.querySelectorAll('.column.drag-over').forEach(function(n){ n.classList.remove('drag-over'); });
      });
      col.addEventListener('dragover', function(ev){
        if(!dragCatId || dragCatId === cat.id) return;
        ev.preventDefault();
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', function(){
        col.classList.remove('drag-over');
      });
      col.addEventListener('drop', function(ev){
        ev.preventDefault();
        col.classList.remove('drag-over');
        if(!dragCatId || dragCatId === cat.id) return;
        var current = orderedCategories().map(function(c){ return c.id; });
        var fromIdx = current.indexOf(dragCatId);
        var toIdx = current.indexOf(cat.id);
        if(fromIdx === -1 || toIdx === -1) return;
        var moved = current.splice(fromIdx, 1)[0];
        current.splice(toIdx, 0, moved);
        uiState.colOrder = current;
        dragCatId = null;
        render();
      });

      boardInner.appendChild(col);
    });

    applyCardStagger();

    // SVG thread overlay
    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('id','thread-svg');
    svg.setAttribute('width', (96+totalColW));
    svg.setAttribute('height', th);
    boardInner.insertBefore(svg, boardInner.firstChild.nextSibling);

    drawThreads(bounds, pxPerYear);
    renderPersonFilter();
    renderThemeFilter();
  }

  // Cards close enough in time to visually overlap get cascaded to the right
  // (like a fanned stack of index cards) so the ones underneath stay visible.
  // Runs fresh on every render, so it self-corrects at any zoom level: cards
  // that no longer overlap snap back to their normal, unstaggered position.
  function applyCardStagger(){
    var STAGGER_PX = 16;
    var MAX_DEPTH = 5;
    document.querySelectorAll('.column').forEach(function(col){
      if(col.classList.contains('collapsed')) return;
      var cards = Array.prototype.slice.call(col.querySelectorAll('.entry-card'));
      if(cards.length < 2) return;
      cards.sort(function(a,b){ return parseFloat(a.style.top) - parseFloat(b.style.top); });
      var clusterBottom = -Infinity;
      var depth = 0;
      cards.forEach(function(card){
        var top = parseFloat(card.style.top);
        var height = card.offsetHeight;
        depth = (top < clusterBottom) ? Math.min(depth + 1, MAX_DEPTH) : 0;
        var z = 200 - depth;
        if(card.classList.contains('selected') || card.classList.contains('related')) z += 1000;
        card.style.left = (10 + depth * STAGGER_PX) + 'px';
        card.style.zIndex = String(z);
        clusterBottom = Math.max(clusterBottom, top + height);
      });
    });
  }

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function renderPersonFilter(){
    var sel = document.getElementById('personFilter');
    var cur = uiState.person;
    sel.innerHTML = '<option value="">All people</option>';
    allPeople().forEach(function(p){
      var opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      if(p === cur) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderThemeFilter(){
    var sel = document.getElementById('themeFilter');
    if(!sel) return;
    var cur = uiState.theme;
    sel.innerHTML = '<option value="">All themes</option>';
    (state.themes||[]).forEach(function(t){
      var opt = document.createElement('option');
      opt.value = t.id; opt.textContent = t.name;
      if(t.id === cur) opt.selected = true;
      sel.appendChild(opt);
    });
    // If the previously selected theme was deleted, fall back to "All themes".
    if(cur && !themeById(cur)){
      uiState.theme = '';
      sel.value = '';
    }
  }

  /* ---------- Connection threads (signature element) ---------- */
  function computeRelated(e, months){
    var m = (months !== undefined) ? months : uiState.nearbyMonths;
    var windowYears = m / 12;
    var selFy = fracYear(e);
    return state.entries.filter(function(x){
      return x.id !== e.id && Math.abs(fracYear(x) - selFy) <= windowYears;
    }).sort(function(a,b){ return fracYear(a) - fracYear(b); });
  }

  function cardCenter(id){
    var card = boardInner.querySelector('.entry-card[data-id="'+id+'"]');
    if(!card) return null;
    var col = card.closest('.column');
    return {
      x: card.offsetLeft + card.offsetWidth/2 + col.offsetLeft,
      y: card.offsetTop + card.offsetHeight/2
    };
  }

  // The "thread": a single line running through every visible entry in
  // chronological order (ties broken alphabetically), crossing columns as needed.
  function buildMasterThreadMarkup(){
    if(!uiState.threadOn) return '';
    var visibleCatIds = {};
    state.categories.forEach(function(c){
      if(!uiState.collapsedCats[c.id]) visibleCatIds[c.id] = true;
    });
    var ordered = state.entries.filter(function(e){
      return visibleCatIds[e.cat] && matchesFilters(e);
    }).sort(function(a,b){
      var fa = positionFracYear(a), fb = positionFracYear(b);
      if(fa !== fb) return fa - fb;
      return a.title.localeCompare(b.title);
    });

    var pts = [];
    ordered.forEach(function(e){
      var c = cardCenter(e.id);
      if(c) pts.push(c);
    });
    if(pts.length < 2) return '';

    var d = 'M ' + pts[0].x + ' ' + pts[0].y;
    for(var i=1;i<pts.length;i++){ d += ' L ' + pts[i].x + ' ' + pts[i].y; }
    var markup = '<path d="'+d+'" stroke="#8c2e22" stroke-opacity="0.6" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';
    pts.forEach(function(p){
      markup += '<circle cx="'+p.x+'" cy="'+p.y+'" r="2.2" fill="#8c2e22" fill-opacity="0.78"/>';
    });
    return markup;
  }

  // The dashed gold "nearby in time" thread radiating from the currently selected entry.
  function buildSelectionThreadMarkup(){
    if(!uiState.selectedId) return '';
    var sel = state.entries.find(function(e){ return e.id === uiState.selectedId; });
    if(!sel) return '';
    var sc = cardCenter(sel.id);
    if(!sc) return '';
    var related = computeRelated(sel);

    var paths = [];
    related.forEach(function(e){
      var ec = cardCenter(e.id);
      if(!ec) return;
      var card = boardInner.querySelector('.entry-card[data-id="'+e.id+'"]');
      if(card) card.classList.add('related');
      var midx = (sc.x+ec.x)/2;
      var d = 'M '+sc.x+' '+sc.y+' Q '+midx+' '+((sc.y+ec.y)/2)+' '+ec.x+' '+ec.y;
      paths.push('<path d="'+d+'" stroke="#a8862f" stroke-opacity="0.55" stroke-width="1.6" fill="none" stroke-dasharray="1 5" stroke-linecap="round"/>');
      paths.push('<circle cx="'+ec.x+'" cy="'+ec.y+'" r="3" fill="#a8862f" fill-opacity="0.8"/>');
    });
    paths.push('<circle cx="'+sc.x+'" cy="'+sc.y+'" r="4.5" fill="#a8862f"/>');
    return paths.join('');
  }

  function drawThreads(bounds, pxPerYear){
    var svg = document.getElementById('thread-svg');
    if(!svg) return;
    document.querySelectorAll('.entry-card.related').forEach(function(n){ n.classList.remove('related'); });
    var masterMarkup = buildMasterThreadMarkup();
    var selectionMarkup = buildSelectionThreadMarkup();
    svg.innerHTML = masterMarkup + selectionMarkup;
  }

  /* ============================= DETAIL PANEL ============================= */

  // Built in two places — initial render and the click handler — so it lives in
  // one function to keep the two identical. The glyph gets its own span so it can
  // be sized and coloured apart from the label, matching the header's Focus pill.
  function focusPinLabel(pinned){
    return pinned
      ? '<span class="fi-hand">&#10003;</span><span>In Focus</span>'
      : '<span class="fi-hand">&#9758;</span><span>Add to Focus</span>';
  }

  function relatedListHTML(related){
    if(!related.length) return '<div class="val" style="color:var(--ink-faint); font-style:italic;">Nothing else nearby yet.</div>';
    return related.map(function(r){
      var rc = catById(r.cat);
      return '<div class="related-item" data-id="'+r.id+'" style="--cat-color:'+rc.color+'; border-left-color:'+rc.color+'">'+
        '<div class="rd">'+dateLabel(r)+' &middot; '+escapeHtml(rc.name)+'</div>'+
        '<div class="rt">'+escapeHtml(r.title)+'</div></div>';
    }).join('');
  }

  function openDetail(id){
    uiState.selectedId = id;
    render();
    var e = state.entries.find(function(x){ return x.id===id; });
    if(!e) return;
    var cat = catById(e.cat);

    var months = uiState.nearbyMonths;
    var related = computeRelated(e, months);
    var autoExpandedFrom = null;
    if(related.length === 0){
      for(var m = months + 1; m <= 18; m++){
        var wider = computeRelated(e, m);
        if(wider.length > 0){
          related = wider;
          autoExpandedFrom = months;
          months = m;
          uiState.nearbyMonths = m;
          break;
        }
      }
    }

    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML =
      '<div class="panel panel-relative" style="--cat-color:'+escapeHtml(cat.color)+'; --titleblock-fg:'+readableOn(cat.color)+'">'+
        '<button class="close-x">&times;</button>'+
        '<div class="panel-titleblock">'+
          '<div class="cat-tag">'+escapeHtml(cat.name)+'</div>'+
          '<h2>'+escapeHtml(e.title)+'</h2>'+
        '</div>'+
        '<div class="field"><label>Event date</label><div class="val">'+dateLabel(e)+'</div></div>'+
        (hasRecordedDate(e) ? '<div class="field"><label>First recorded</label><div class="val">'+recordedDateLabel(e)+
          (isRetrospective(e) ? ' <span class="retro-note">&#9888; retrospective account, recorded after the event it describes</span>' : '')+
          '</div></div>' : '')+
        (e.desc ? '<div class="field"><label>Notes</label><div class="val">'+escapeHtml(e.desc)+'</div></div>' : '')+
        (e.sources && e.sources.length ? '<div class="field"><label>Sources / citations</label><div class="sources-list">'+
          e.sources.map(function(s){
            return '<div class="source-item">'+
              (s.text ? escapeHtml(s.text) : '<span style="color:var(--ink-faint); font-style:italic;">Untitled source</span>')+
              (s.url ? ' <a class="source-link" href="'+escapeHtml(s.url)+'" target="_blank" rel="noopener noreferrer">View source &#8599;</a>' : '')+
              '</div>';
          }).join('')+
          '</div></div>' : '')+
        ((e.people&&e.people.length) ? '<div class="field"><label>People</label><div class="people-tags">'+e.people.map(function(p){return '<span class="ptag" data-p="'+escapeHtml(p)+'">'+escapeHtml(p)+'</span>';}).join('')+'</div></div>' : '')+
        ((e.themes&&e.themes.length) ? '<div class="field"><label>Themes</label><div class="people-tags">'+e.themes.map(function(tid){
            var t = themeById(tid);
            if(!t) return '';
            return '<span class="theme-tag" data-theme="'+t.id+'"><span class="dot" style="background:'+t.color+'"></span>'+escapeHtml(t.name)+'</span>';
          }).join('')+'</div></div>' : '')+
        '<div class="actions">'+
          '<button class="ghost focus-pin-action'+(isPinned(e.id)?' pinned':'')+'" id="focusPinBtn">'+focusPinLabel(isPinned(e.id))+'</button>'+
          (isAdmin ? '<button id="editEntryBtn">Edit</button>'+
          '<button class="ghost" id="deleteEntryBtn">Delete</button>' : '')+
        '</div>'+
        // Marks the shift from describing this entry to navigating to others.
        '<hr class="panel-rule">'+
        '<div class="field" style="margin-top:0;">'+
          '<label>Nearby in time <span id="nearbyDesc">(within '+months+' month'+(months===1?'':'s')+', other categories)</span></label>'+
          (autoExpandedFrom !== null ? '<div class="auto-expand-note" id="autoExpandNote">Widened automatically from '+autoExpandedFrom+' month'+(autoExpandedFrom===1?'':'s')+' — nothing else was that close.</div>' : '<div class="auto-expand-note" id="autoExpandNote" style="display:none;"></div>')+
          '<div class="nearby-controls">'+
            '<input type="range" id="nearbyRange" min="1" max="18" step="1" value="'+months+'">'+
            '<input type="number" id="nearbyNumber" min="1" max="18" value="'+months+'">'+
            '<span class="nearby-unit">mo</span>'+
          '</div>'+
          '<div class="related-list" id="relatedList">'+relatedListHTML(related)+'</div>'+
        '</div>'+
        (e.researchNotes ? '<details class="notes-details">'+
          '<summary>Additional Notes</summary>'+
          '<div class="notes-details-body">'+escapeHtml(e.researchNotes)+'</div>'+
        '</details>' : '')+
        '<div class="entry-refid-bar">'+
          '<button type="button" class="report-flag-btn" id="reportEntryBtn" title="Report an issue with this entry">&#9873; Report</button>'+
          '<span class="entry-refid">'+escapeHtml(e.refId||'')+'</span>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);

    function attachRelatedClicks(){
      overlay.querySelectorAll('.related-item').forEach(function(item){
        item.addEventListener('click', function(){
          var id2 = item.dataset.id;
          closeOverlay(overlay, false);
          openDetail(id2);
        });
      });
    }
    attachRelatedClicks();

    function applyNearbyMonths(val){
      val = Math.max(1, Math.min(18, parseInt(val,10) || 1));
      uiState.nearbyMonths = val;
      overlay.querySelector('#nearbyRange').value = val;
      overlay.querySelector('#nearbyNumber').value = val;
      overlay.querySelector('#nearbyDesc').textContent = '(within '+val+' month'+(val===1?'':'s')+', other categories)';
      var noteEl = overlay.querySelector('#autoExpandNote');
      if(noteEl){ noteEl.style.display = 'none'; noteEl.textContent = ''; }
      var freshRelated = computeRelated(e);
      var listEl = overlay.querySelector('#relatedList');
      listEl.innerHTML = relatedListHTML(freshRelated);
      attachRelatedClicks();
      render();
    }
    overlay.querySelector('#nearbyRange').addEventListener('input', function(ev){ applyNearbyMonths(ev.target.value); });
    overlay.querySelector('#nearbyNumber').addEventListener('input', function(ev){ applyNearbyMonths(ev.target.value); });

    overlay.addEventListener('click', function(ev){ if(ev.target === overlay) closeOverlay(overlay, true); });
    overlay.querySelector('.close-x').addEventListener('click', function(){ closeOverlay(overlay, true); });
    overlay.querySelectorAll('.ptag').forEach(function(tag){
      tag.addEventListener('click', function(){
        uiState.person = tag.dataset.p;
        document.getElementById('personFilter').value = uiState.person;
        closeOverlay(overlay, true);
        render();
      });
    });
    overlay.querySelectorAll('.theme-tag').forEach(function(tag){
      tag.addEventListener('click', function(){
        uiState.theme = tag.dataset.theme;
        document.getElementById('themeFilter').value = uiState.theme;
        closeOverlay(overlay, true);
        render();
      });
    });
    overlay.querySelector('#reportEntryBtn').addEventListener('click', function(){
      // Close the detail panel first, matching how the Edit button behaves, so
      // the report modal isn't stacked on top of it. Passing `false` keeps the
      // entry selected on the board underneath.
      closeOverlay(overlay, false);
      openReportModal(e);
    });
    overlay.querySelector('#focusPinBtn').addEventListener('click', function(ev){
      toggleFocus(e.id);
      var nowPinned = isPinned(e.id);
      ev.currentTarget.classList.toggle('pinned', nowPinned);
      ev.currentTarget.innerHTML = focusPinLabel(nowPinned);
    });
    if(isAdmin){
      overlay.querySelector('#editEntryBtn').addEventListener('click', function(){
        closeOverlay(overlay, false);
        openEntryForm(e);
      });
      overlay.querySelector('#deleteEntryBtn').addEventListener('click', function(){
        if(confirm('Delete "'+e.title+'"? This cannot be undone.')){
          state.entries = state.entries.filter(function(x){ return x.id !== e.id; });
          saveState();
          if(isPinned(e.id)){
            focusState.ids = focusState.ids.filter(function(id){ return id !== e.id; });
            saveFocusState();
            renderFocusList();
          }
          uiState.selectedId = null;
          closeOverlay(overlay, true);
          render();
        }
      });
    }
  }


  function closeOverlay(overlay, deselect){
    overlay.remove();
    if(deselect){ uiState.selectedId = null; render(); }
  }

  /* ============================= ADD / EDIT ENTRY FORM ============================= */

  function openEntryForm(existing){
    if(!isAdmin) return;
    var isEdit = !!existing;
    var overlay = document.createElement('div');

        '<div class="field" style="margin-bottom:4px; margin-top:6px;">'+
          '<label style="margin-bottom:2px;">First recorded &mdash; optional</label>'+

            '<span class="eg">e.g. the First Vision: event 1820, first recorded 1832.</span></div>'+
        '</div>'+
        '<div class="row3">'+
          '<div class="field"><label>Year</label><input type="text" id="f_ryear" value="'+(existing&&existing.recordedY?existing.recordedY:'')+'" placeholder="e.g. 1838"></div>'+
          '<div class="field"><label>Month (opt.)</label><input type="text" id="f_rmonth" value="'+(existing&&existing.recordedM?existing.recordedM:'')+'" placeholder="1-12"></div>'+
          '<div class="field"><label>Day (opt.)</label><input type="text" id="f_rday" value="'+(existing&&existing.recordedD?existing.recordedD:'')+'" placeholder="1-31"></div>'+
        '</div>'+

          '<div class="tag-input" id="peopleTagInput">'+

            '<div class="tag-suggestions" id="peopleSuggestions" style="display:none;"></div>'+
          '</div>'+
        '</div>'+

          '<div class="theme-select-row" id="themeSelectRow"></div>'+
        '</div>'+
        '<div class="field"><label>Notes</label><textarea id="f_desc">'+(existing?escapeHtml(existing.desc||''):'')+'</textarea></div>'+
        '<div class="field"><label>Sources / citations</label>'+
          '<div id="sourceRows"></div>'+
          '<button type="button" class="ghost" id="addSourceRowBtn" style="font-size:11.5px; padding:5px 10px;">+ Add another source</button>'+
        '</div>'+

          '<textarea id="f_researchnotes" placeholder="Provenance and context: when a source was written relative to the event, who wrote it, their relationship to Joseph Smith, whether other accounts agree or differ. State facts, not conclusions — let readers judge for themselves. Collapsed by default; for collaborators, not the main view.">'+(existing?escapeHtml(existing.researchNotes||''):'')+'</textarea>'+
        '</div>'+
        '<div class="actions">'+
          '<button id="saveEntryBtn">'+(isEdit?'Save changes':'Add entry')+'</button>'+
          '<button class="ghost" id="cancelEntryBtn">Cancel</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(overlay);

    // People-involved tag input with autocomplete against everyone already used elsewhere
    var peopleList = (existing && existing.people) ? existing.people.slice() : [];
    var knownPeople = allPeople();
    var peopleChipsEl = overlay.querySelector('#peopleChips');
    var peopleTextInput = overlay.querySelector('#peopleTextInput');
    var peopleSuggEl = overlay.querySelector('#peopleSuggestions');

    function renderPeopleChips(){
      peopleChipsEl.innerHTML = peopleList.map(function(p, i){
        return '<span class="tag-chip">'+escapeHtml(p)+'<button type="button" class="tag-chip-remove" data-idx="'+i+'">&times;</button></span>';
      }).join('');
      peopleChipsEl.querySelectorAll('.tag-chip-remove').forEach(function(btn){
        btn.addEventListener('click', function(){
          peopleList.splice(parseInt(btn.dataset.idx,10), 1);
          renderPeopleChips();
        });
      });
    }
    renderPeopleChips();

    function addPerson(name){
      name = name.trim();
      if(!name) return;
      var already = peopleList.some(function(p){ return p.toLowerCase() === name.toLowerCase(); });
      if(!already) peopleList.push(name);
      peopleTextInput.value = '';
      peopleSuggEl.style.display = 'none';
      peopleSuggEl.innerHTML = '';
      renderPeopleChips();
      peopleTextInput.focus();
    }

    function updatePeopleSuggestions(){
      var val = peopleTextInput.value.trim().toLowerCase();
      if(!val){ peopleSuggEl.style.display = 'none'; peopleSuggEl.innerHTML=''; return; }
      var matches = knownPeople.filter(function(p){
        return p.toLowerCase().indexOf(val) !== -1 && !peopleList.some(function(existingP){ return existingP.toLowerCase()===p.toLowerCase(); });
      }).slice(0, 6);

    renderThemeChips();

        peopleList.push(leftoverPerson);

      });
      if(typeof state.nextRefId !== 'number' || isNaN(state.nextRefId)) state.nextRefId = 1;
      var entry = {
        id: existing ? existing.id : genId('e'),
        refId: existing ? existing.refId : formatRefId(state.nextRefId),
        cat: document.getElementById('f_cat').value,
        title: title,
        y: year,
        m: isNaN(month)? undefined : month,
        d: isNaN(day)? undefined : day,
        approx: document.getElementById('f_approx').checked,
        recordedY: isNaN(rYear) ? undefined : rYear,
        recordedM: isNaN(rMonth) ? undefined : rMonth,
        recordedD: isNaN(rDay) ? undefined : rDay,

        desc: document.getElementById('f_desc').value.trim(),

        state.entries[idx] = entry;
      }else{
        state.entries.push(entry);
      }
      saveState();
      overlay.remove();

    });
  }

  /* ============================= REPORT AN ISSUE ============================= */
  // One shared modal serving two entry points: the flag button in an entry's
  // detail panel (which passes that entry for context) and the one in the page
  // footer (which passes nothing, for a general report).
  //
  // INTERIM DELIVERY: there is no server, so submitting hands the report to the
  // visitor's own email program via a mailto: link. The page transmits nothing
  // itself, and the visitor can read and edit the message before sending. When
  // a backend arrives, only sendReport() below should need to change — the
  // report object it builds is already the shape a database row would take.

  function buildReportText(report){
    var lines = [];
    lines.push('Joseph Smith MultiTimeline — issue report');
    lines.push('');
    if(report.refId || report.entryTitle){
      lines.push('Entry:     ' + (report.refId ? report.refId + ' — ' : '') + (report.entryTitle || ''));
    }else{
      lines.push('Entry:     (general report — not tied to a specific entry)');
    }
    lines.push('Category:  ' + report.category);
    if(report.reporter) lines.push('Reported by: ' + report.reporter);
    lines.push('Submitted: ' + report.submitted);
    lines.push('');
    lines.push('Details:');
    lines.push(report.details);
    return lines.join('\n');
  }

  function sendReport(report){
    // Subject carries the issue type and, when there is one, the entry's ref id
    // — e.g. "MultiTimeline — Source problem — ID-014" — so reports can be
    // sorted and triaged straight from an inbox list without opening them.
    var subject = 'MultiTimeline — ' + report.categoryShort + (report.refId ? ' — ' + report.refId : '');
    var body = buildReportText(report);
    // The address is left unencoded (valid in mailto); subject and body are
    // encoded so line breaks and punctuation survive the trip.
    window.location.href = 'mailto:' + REPORT_EMAIL +
      '?subject=' + encodeURIComponent(subject) +
      '&body=' + encodeURIComponent(body);
  }

  function openReportModal(entry){
    var overlay = document.createElement('div');
    overlay.className = 'overlay center';
    // Option values are indexes, so the label text stays free to change without
    // the lookup depending on exact string matching.
    var catOptions = FLAG_CATEGORIES.map(function(c, i){
      return '<option value="' + i + '">' + escapeHtml(c.label) + '</option>';
    }).join('');

    overlay.innerHTML =
      '<div class="panel modal panel-relative" style="width:470px;">'+
        '<button class="close-x">&times;</button>'+
        '<h2>&#9873; Report an issue</h2>'+
        (entry
          ? '<div class="report-context"><span class="rc-ref">'+escapeHtml(entry.refId||'')+'</span><br>'+escapeHtml(entry.title)+'</div>'
          : '<div class="report-context general">General report — not tied to a specific entry. To report a problem with one particular entry, open it and use the flag button at the bottom of its detail panel.</div>')+
        '<div class="field"><label>What kind of issue?</label><select id="rp_cat">'+catOptions+'</select></div>'+
        '<div class="field"><label>Details</label>'+
          '<textarea id="rp_details" placeholder="What is wrong, and what should it say instead? Citations or links to supporting sources are especially helpful."></textarea>'+
        '</div>'+
        '<div class="field"><label>Your name (optional)</label>'+
          '<input type="text" id="rp_name" placeholder="So the report can be followed up on">'+
        '</div>'+
        '<div class="actions">'+
          '<button id="rp_send">Open email to send</button>'+
          '<button class="ghost" id="rp_copy">Copy report instead</button>'+
          '<button class="ghost" id="rp_cancel">Cancel</button>'+
        '</div>'+
        '<div class="report-note">This opens your own email program with the report filled in — nothing is sent automatically, and you can edit it first. If no email program opens, use &ldquo;Copy report instead&rdquo; and paste it wherever you like.</div>'+
      '</div>';
    document.body.appendChild(overlay);

    function collect(){
      var details = overlay.querySelector('#rp_details').value.trim();
      if(!details){
        alert('Please describe the issue before submitting.');
        overlay.querySelector('#rp_details').focus();
        return null;
      }
      var cat = FLAG_CATEGORIES[parseInt(overlay.querySelector('#rp_cat').value, 10)] || FLAG_CATEGORIES[FLAG_CATEGORIES.length - 1];
      return {
        refId: entry ? (entry.refId || '') : '',
        entryId: entry ? entry.id : '',
        entryTitle: entry ? entry.title : '',
        category: cat.label,
        categoryShort: cat.short,
        details: details,
        reporter: overlay.querySelector('#rp_name').value.trim(),
        submitted: new Date().toISOString().slice(0,10)
      };
    }

    overlay.querySelector('#rp_send').addEventListener('click', function(){
      var report = collect();
      if(!report) return;
      sendReport(report);
      overlay.remove();
    });
    overlay.querySelector('#rp_copy').addEventListener('click', function(){
      var report = collect();
      if(!report) return;
      copyToClipboard(buildReportText(report), 'Report copied — paste it into an email or message.');
      overlay.remove();
    });

    overlay.querySelector('#rp_cancel').addEventListener('click', function(){ overlay.remove(); });
    overlay.querySelector('.close-x').addEventListener('click', function(){ overlay.remove(); });
    overlay.addEventListener('click', function(ev){ if(ev.target===overlay) overlay.remove(); });
    overlay.querySelector('#rp_details').focus();
  }

  // Copies text to the clipboard with a graceful fallback for browsers/contexts
  // where the async Clipboard API isn't available.
  function copyToClipboard(text, successMessage){
    function fallback(){
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{
        document.execCommand('copy');
        alert(successMessage);
      }catch(e){
        prompt('Copy this manually:', text);
      }
      ta.remove();
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){
        alert(successMessage);
      }).catch(fallback);
    }else{
      fallback();
    }
  }

  function buildFocusPlainText(){
    var lines = [];
    lines.push(focusState.title ? focusState.title : 'Untitled Focus thread');
    if(focusState.notes) lines.push(focusState.notes);
    lines.push('');
    var entries = sortedFocusEntries();
    if(!entries.length){
      lines.push('(no entries pinned yet)');
    }else{
      entries.forEach(function(e){
        lines.push('• ' + dateLabel(e) + ' — ' + e.title + (e.refId ? ' ['+e.refId+']' : ''));
      });
    }
    lines.push('');
    lines.push('— from Joseph Smith MultiTimeline');
    return lines.join('\n');
  }

  // Shareable links are built on each entry's stable refId (e.g. ID-014) rather
  // than its internal id, since refIds are the durable, human-shareable handle.
  function encodeFocusPayload(){
    var payload = {
      t: focusState.title || '',
      n: focusState.notes || '',
      ids: sortedFocusEntries().map(function(e){ return e.refId; }).filter(Boolean)
    };
    var json = JSON.stringify(payload);
    var b64 = btoa(unescape(encodeURIComponent(json)));
    return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }
  function decodeFocusPayload(str){
    try{
      var s = str.replace(/-/g,'+').replace(/_/g,'/');
      while(s.length % 4) s += '=';
      var json = decodeURIComponent(escape(atob(s)));
      return JSON.parse(json);
    }catch(err){ return null; }
  }
  function buildFocusShareUrl(){
    var base = location.origin + location.pathname;
    return base + '?focus=' + encodeFocusPayload();
  }

  // On first load, check whether this page was opened via a shared Focus link.
  function checkForSharedFocusLink(){
    var params = new URLSearchParams(location.search);
    var raw = params.get('focus');
    if(!raw) return;
    var payload = decodeFocusPayload(raw);
    if(history.replaceState) history.replaceState(null, '', location.pathname + location.hash);
    if(!payload || !Array.isArray(payload.ids) || !payload.ids.length){
      alert('That shared Focus link could not be read.');
      return;
    }
    var resolvedIds = [];
    payload.ids.forEach(function(refId){
      var match = state.entries.find(function(e){ return e.refId === refId; });
      if(match) resolvedIds.push(match.id);
    });
    var missing = payload.ids.length - resolvedIds.length;
    if(!resolvedIds.length){
      alert('This shared Focus link doesn\'t match any entries in your current data.');
      return;
    }
    var msg = 'This link contains a shared Focus thread'+(payload.t ? ': "'+payload.t+'"' : '')+
      ' with '+resolvedIds.length+' entr'+(resolvedIds.length===1?'y':'ies')+
      (missing ? ' ('+missing+' not found in your current data)' : '')+
      '.\n\nLoad it into your Focus panel? This will replace your current Focus selection.';
    if(confirm(msg)){
      focusState.title = payload.t || '';
      focusState.notes = payload.n || '';
      focusState.ids = resolvedIds;
      focusState.open = true;
      saveFocusState();
      applyFocusOpenState();
      render();
    }
  }

  updateAdminUI();

  document.getElementById('focusToggleBtn').addEventListener('click', function(){
    focusState.open = !focusState.open;
    saveFocusState();
    applyFocusOpenState();
  });
  applyFocusOpenState();

  var THREAD_ICON_SVG = '<svg class="thread-icon-svg" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">thread-roll-filled</title><path fill="#8c2e22" d="M6 12.59L11.59 7H6zm12-1.18L12.41 17H18zM18 7h-3.59L6 15.41V17h3.59L18 8.59z"/><rect width="16" height="3" x="4" y="2" fill="#8c2e22" rx=".75" ry=".75"/><rect width="16" height="3" x="4" y="19" fill="#8c2e22" rx=".75" ry=".75"/></svg>';

  function updateThreadToggleUI(){
    var btn = document.getElementById('threadToggleBtn');
    btn.classList.toggle('on', uiState.threadOn);
    btn.innerHTML = THREAD_ICON_SVG + (uiState.threadOn ? ' Thread: On' : ' Thread: Off');
  }
  document.getElementById('threadToggleBtn').addEventListener('click', function(){
    uiState.threadOn = !uiState.threadOn;
    updateThreadToggleUI();
    render();
  });
  updateThreadToggleUI();

  document.getElementById('positionToggle').addEventListener('click', function(ev){
    var btn = ev.target.closest('.seg-btn');
    if(!btn) return;
    uiState.positionBy = btn.dataset.mode;
    document.querySelectorAll('#positionToggle .seg-btn').forEach(function(b){
      b.classList.toggle('on', b.dataset.mode === uiState.positionBy);
    });
    render();
  });

  /* ============================= TOOLBAR WIRING ============================= */

  document.getElementById('searchBox').addEventListener('input', function(e){
    uiState.search = e.target.value; render();
  });
  document.getElementById('personFilter').addEventListener('change', function(e){
    uiState.person = e.target.value; render();
  });
  document.getElementById('themeFilter').addEventListener('change', function(e){
    uiState.theme = e.target.value; render();
  });
  document.getElementById('zoomSlider').addEventListener('input', function(e){
    var boardWrap = document.getElementById('board-wrap');
    var bounds = minMaxYear();
    var oldPxPerYear = uiState.zoom;
    var viewportH = boardWrap.clientHeight;
    var centerPx = boardWrap.scrollTop + viewportH / 2;
    var centerFy = bounds.min + (centerPx - PADDING_TOP) / oldPxPerYear;

    uiState.zoom = parseInt(e.target.value, 10);
    render();

    var newCenterPx = PADDING_TOP + (centerFy - bounds.min) * uiState.zoom;
    boardWrap.scrollTop = Math.max(0, newCenterPx - viewportH / 2);
  });
  document.getElementById('addEntryBtn').addEventListener('click', function(){ openEntryForm(null); });
  document.getElementById('manageCatsBtn').addEventListener('click', openManageCategories);
  document.getElementById('manageThemesBtn').addEventListener('click', openManageThemes);
  // General report — no entry passed, so the modal opens without entry context.
  document.getElementById('reportGeneralBtn').addEventListener('click', function(){ openReportModal(null); });

  document.getElementById('exportBtn').addEventListener('click', function(){
    if(!isAdmin) return;
    var blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'joseph-smith-timeline-data.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });
  document.getElementById('importBtn').addEventListener('click', function(){
    if(!isAdmin) return;
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', function(e){
    if(!isAdmin) return;
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var parsed = JSON.parse(reader.result);
        if(parsed && parsed.categories && parsed.entries){
          if(confirm('Replace the current board with the imported data?')){
            parsed.entries.forEach(normalizeEntry);
            ensureRefIds(parsed);
            if(!Array.isArray(parsed.themes)) parsed.themes = DEFAULT_THEMES.slice();
            state = parsed;
            uiState.collapsedCats = {};
            uiState.selectedId = null;
            uiState.theme = '';
            uiState.colOrder = null;
            saveState();
            render();
          }
        }else{
          alert('That file doesn\'t look like a valid timeline export.');
        }
      }catch(err){
        alert('Could not read that file as JSON.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Column "+ add" buttons (delegated, since columns re-render)
  boardInner.addEventListener('click', function(ev){
    if(ev.target.matches('.add-in-col')){
      var catId = ev.target.dataset.cat;
      openEntryForm(null);
      setTimeout(function(){
        var sel = document.getElementById('f_cat');
        if(sel) sel.value = catId;
      }, 0);
    }
  });

  window.addEventListener('resize', function(){ drawThreads(minMaxYear(), uiState.zoom); });

  render();

  // Open the board scrolled to a more eventful starting point rather than
  // the very beginning of the timeline, so first-time visitors land somewhere
  // with plenty of entries to explore right away.
  function scrollToYear(year, topOffset){
    var bounds = minMaxYear();
    var y = yFor(year, bounds, uiState.zoom);
    document.getElementById('board-wrap').scrollTop = Math.max(0, y - (topOffset || 40));
  }
  scrollToYear(1825);
  checkForSharedFocusLink();
})();
</script>
</body>
</html>
