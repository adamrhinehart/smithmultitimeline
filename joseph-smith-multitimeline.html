<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joseph Smith MultiTimeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F1E9D8;
    --paper-dark: #E7DBBF;
    --paper-deep: #DFD1AE;
    --ink: #2A2420;
    --ink-soft: #6b5f52;
    --ink-faint: #9c8f7c;
    --rule: #cabb98;
    --rule-strong: #b3a077;
    --brass: #a8862f;
    --brass-dark: #7d631f;
    --card-bg: #fbf6e9;
    --shadow: 0 1px 2px rgba(42,36,32,0.15), 0 4px 10px rgba(42,36,32,0.08);
    --radius: 3px;

    /* Prussian blue — the period's dominant blue pigment (synthesized 1706, in
       heavy use through the 1800s in ink, textiles and printing, and the blue of
       cyanotype blueprints from 1842). Kept as variables so the header tone can
       be retuned from one place. */
    --header-top: #16304C;
    --header-bottom: #1D3D5E;

    /* One height for every interactive control in the header and toolbar, so a
       row of them shares a common top and bottom edge. Shape alone signals the
       type: a 20px radius pill is a button or toggle, the 3px radius is a field
       (text input, dropdown). Controls set this via height rather than padding,
       so differing font sizes can't push them out of alignment. */
    --control-h: 30px;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
  }
  ::selection{ background: var(--brass); color:#fff; }

  h1,h2,h3, .display{
    font-family:'Fraunces', serif;
  }

  /* ---------- Layout shell ---------- */
  #app{ display:flex; flex-direction:column; height:100vh; }

  header.top{
    background: linear-gradient(180deg, var(--header-top) 0%, var(--header-bottom) 100%);
    color: #EFE6D2;
    padding: 14px 22px 12px;
    display:flex; align-items:baseline; gap:18px; flex-wrap:wrap;
    border-bottom: 3px double var(--brass);
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    z-index: 30;
  }
  header.top h1{
    font-size: 22px; font-weight:600; margin:0; letter-spacing:.3px;
    color:#F3E9D0;
  }
  header.top .subtitle{
    font-family:'Inter', sans-serif;
    font-size:11px; color: #c9b98d; letter-spacing:.08em; text-transform:uppercase;
  }
  .header-spacer{ flex:1; }
  .admin-toggle{
    background: transparent;
    border:1px solid var(--brass);
    color:#F3E9D0;
    font-family:'Inter', sans-serif;
    font-size:11px;
    height: var(--control-h);
    padding:0 14px;
    border-radius:20px;
    cursor:pointer;
    letter-spacing:.05em;
    align-self:center;
    display:inline-flex; align-items:center;
  }
  .admin-toggle:hover{ background: rgba(168,134,47,0.22); }
  .admin-toggle.unlocked{
    background: var(--brass); color:#2A2420; border-color:var(--brass); font-weight:600;
  }
  .admin-toggle.unlocked:hover{ background: var(--brass-dark); color:#F3E9D0; }

  .toolbar{
    display:flex; align-items:center; gap:10px; padding:10px 22px;
    background: var(--paper-dark);
    border-bottom:1px solid var(--rule-strong);
    flex-wrap:wrap;
    z-index:29;
  }
  .toolbar input[type=text], .toolbar select{
    font-family:'Inter',sans-serif;
    font-size:13px;
    height: var(--control-h);
    padding:0 10px;
    border:1px solid var(--rule-strong);
    border-radius: var(--radius);
    background:var(--card-bg);
    color:var(--ink);
  }
  .toolbar input[type=text]{ width:220px; }
  .toolbar label.small{
    font-family:'Inter', sans-serif;
    font-size:10.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;
    display:flex; align-items:center; gap:6px;
  }
  .toolbar input[type=range]{ width:110px; accent-color: var(--brass); }
  /* Admin buttons share the row, so they share its height. Their squared corners
     are left as-is for now — converting them to pills is a separate decision. */
  #adminControls button{
    height: var(--control-h);
    padding:0 13px;
    display:inline-flex; align-items:center;
  }

  button{
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding:7px 13px;
    border-radius: var(--radius);
    border:1px solid var(--brass-dark);
    background: var(--brass);
    color:#fff;
    cursor:pointer;
    letter-spacing:.01em;
  }
  button:hover{ background: var(--brass-dark); }
  button.ghost{
    background: transparent;
    color: var(--ink);
    border:1px solid var(--rule-strong);
  }
  button.ghost:hover{ background: var(--paper-deep); }
  /* Sized to match the Focus and Admin pills in the header, so every button and
     toggle in the interface shares one shape — leaving the squared 3px radius to
     read as "field" (dropdowns, text inputs). Colors are untouched. */
  .thread-toggle{
    font-size:11px;
    height: var(--control-h);
    padding:0 14px;
    border-radius:20px;
    letter-spacing:.05em;
    display:inline-flex; align-items:center;
  }
  .thread-toggle.on{
    background: #8c2e22; color:#fff; border-color:#6e2419; font-weight:700;
  }
  .thread-toggle.on:hover{ background: #6e2419; }
  .thread-icon-svg{
    width:13px; height:13px;
    vertical-align:-2px;
    margin-right:4px;
  }
  .thread-toggle.on .thread-icon-svg path,
  .thread-toggle.on .thread-icon-svg rect{
    fill:#fff;
  }

  .seg-toggle{
    display:inline-flex; align-items:stretch;
    border:1px solid var(--rule-strong); border-radius:20px;
    overflow:hidden; margin-left:4px;
    height: var(--control-h);
  }
  /* Height comes from the wrapper; the segments stretch to fill it, so they
     stay aligned with the neighbouring pills regardless of label size. */
  .seg-btn{
    font-family:'Inter', sans-serif; font-size:10.5px;
    height:100%; padding:0 12px; border:none; border-radius:0;
    background: var(--card-bg); color:var(--ink-soft);
    display:inline-flex; align-items:center;
  }
  .seg-btn + .seg-btn{ border-left:1px solid var(--rule-strong); }
  .seg-btn.on{ background: var(--brass); color:#fff; font-weight:700; }
  .seg-btn:hover:not(.on){ background: var(--paper-deep); }

  .retro-mark{
    display:inline-flex; align-items:center; justify-content:center;
    width:13px; height:13px; border-radius:50%;
    background:#8c2e22; color:#fff; font-size:9px; font-weight:700;
    font-family:'Inter', sans-serif;
    margin-left:5px; cursor:help; vertical-align:middle;
  }
  .retro-note{
    font-family:'Inter', sans-serif; font-size:11px; color:#8c2e22;
    display:inline-block; margin-top:2px;
  }
  .auto-expand-note{
    font-family:'Inter', sans-serif; font-size:10.5px; color:#8c2e22;
    margin:3px 0 2px; font-style:italic;
  }
  .notes-details{
    margin-top:18px;
    border-top: 1px dashed var(--rule-strong);
    padding-top:10px;
  }
  .notes-details summary{
    cursor:pointer;
    list-style:none;
    font-family:'Inter', sans-serif;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.07em;
    color: var(--ink-soft);
    display:flex;
    align-items:center;
    gap:6px;
    user-select:none;
  }
  .notes-details summary::-webkit-details-marker{ display:none; }
  .notes-details summary::before{
    content:'\25B8';
    font-size:9px;
    color: var(--ink-faint);
    transition: transform .12s ease;
    display:inline-block;
  }
  .notes-details[open] summary::before{ transform: rotate(90deg); }
  .notes-details summary:hover{ color: var(--ink); }
  .notes-details-body{
    margin-top:8px;
    padding:8px 10px;
    background: var(--paper-dark);
    border-left: 2px dashed var(--rule-strong);
    font-size:12px;
    line-height:1.55;
    color: var(--ink-soft);
    font-style:italic;
    white-space:pre-line;
  }
  .entry-refid-bar{
    position:sticky; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background: linear-gradient(180deg, transparent, var(--paper) 55%);
    padding:14px 0 0;
    /* auto, not a fixed value: consumes any leftover vertical space so the bar
       is pushed to the foot of the panel on short entries. */
    margin-top:auto;
    flex:0 0 auto;
    pointer-events:none;
  }
  /* The bar itself stays click-through so it doesn't block content scrolling
     beneath it; its actual children need clicks back. */
  .entry-refid-bar > *{ pointer-events:auto; }
  /* Reference codes stay monospace now that the rest of the interface is Inter.
     They are identifiers meant to be read aloud, quoted and compared character
     by character, so they should read as data rather than prose — and crucially
     a monospace zero is unmistakably a zero rather than a capital O.
     `slashed-zero` asks the font for its slashed zero variant, which removes any
     remaining doubt; it degrades harmlessly to the ordinary zero if unavailable.
     All three rules below style the same kind of code and are kept in sync. */
  .entry-refid{
    font-family:'IBM Plex Mono', monospace; font-size:10px;
    color: var(--ink-faint); letter-spacing:.05em;
    font-variant-numeric: slashed-zero;
  }

  /* ---------- Issue reporting ---------- */
  .report-flag-btn{
    background:transparent;
    border:1px solid var(--rule-strong);
    color: var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size:10.5px;
    font-weight:500;
    padding:4px 9px;
    border-radius:20px;
    letter-spacing:.04em;
  }
  .report-flag-btn:hover{
    background: var(--paper-deep);
    color:#8c2e22;
    border-color:#8c2e22;
  }
  .report-context{
    font-size:12.5px;
    line-height:1.45;
    background: var(--paper-dark);
    border-left:3px solid var(--brass);
    padding:8px 10px;
    border-radius:2px;
    margin-bottom:14px;
  }
  .report-context.general{ color: var(--ink-soft); font-style:italic; border-left-color: var(--rule-strong); }
  .report-context .rc-ref{
    font-family:'IBM Plex Mono', monospace; font-size:11px; color: var(--ink-soft);
    font-variant-numeric: slashed-zero;
  }
  .report-note{
    margin-top:14px;
    font-size:11.5px;
    line-height:1.5;
    color: var(--ink-faint);
    border-top:1px dashed var(--rule-strong);
    padding-top:10px;
  }
  .form-refid{
    font-family:'IBM Plex Mono', monospace; font-size:11px;
    color: var(--ink-faint); font-weight:400; letter-spacing:.03em;
    font-variant-numeric: slashed-zero;
  }
  button.subtle{
    background:transparent; border:none; color:var(--ink-soft);
    padding:2px 4px; font-weight:500;
  }
  button.subtle:hover{ color:var(--ink); text-decoration:underline; }

  .spacer{ flex:1; }

  .theme-select-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .theme-toggle-chip{
    font-family:'Inter', sans-serif;
    font-size:11.5px;
    padding:5px 10px 5px 8px;
    border-radius:20px;
    border:1px solid var(--rule-strong);
    background: var(--card-bg);
    color: var(--ink-soft);
    display:inline-flex; align-items:center; gap:6px;
    cursor:pointer;
    user-select:none;
  }
  .theme-toggle-chip .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .theme-toggle-chip.selected{
    background: var(--theme-color, var(--brass));
    border-color: var(--theme-color, var(--brass));
    color:#fff;
    font-weight:600;
  }
  .theme-toggle-chip.selected .dot{ background:#fff !important; }
  .theme-empty-note{ font-size:12px; color:var(--ink-faint); font-style:italic; }

  .theme-tag{
    font-family:'Inter', sans-serif;
    font-size:11px;
    padding:3px 9px 3px 7px;
    border-radius:20px;
    border:1px solid var(--rule-strong);
    background: var(--card-bg);
    display:inline-flex; align-items:center; gap:5px;
    cursor:pointer;
  }
  .theme-tag:hover{ background: var(--paper-deep); }
  .theme-tag .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }

  /* ---------- Board ---------- */
  #main-row{
    flex:1;
    display:flex;
    min-height:0;
    overflow:hidden;
  }
  #board-wrap{
    flex:1;
    min-width:0;
    overflow:auto;
    position:relative;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(180deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 44px);
  }
  #board-inner{
    position:relative;
    display:flex;
    min-height:100%;
  }
  #rail{
    position:sticky; left:0; top:0;
    width:96px; flex:0 0 96px;
    background: linear-gradient(90deg, var(--paper-dark) 0%, var(--paper-dark) 88%, transparent 100%);
    z-index:20;
    border-right:1px solid var(--rule-strong);
  }
  .year-mark{
    position:absolute; left:0; right:0;
    display:flex; align-items:center; justify-content:flex-end;
    padding-right:12px;
    font-family:'Fraunces', serif;
    /* Fraunces is proportional, so year digits would otherwise sit at slightly
       different widths down the rail; tabular figures keep them aligned. */
    font-variant-numeric: tabular-nums;
    font-feature-settings: 'tnum' 1;
    color: var(--ink-soft);
    font-size:14px;
    height:0;
  }
  .year-mark.major{ font-weight:600; color:var(--ink); font-size:16px; }
  .year-mark::after{
    content:''; position:absolute; right:-1px; top:0;
    width:6px; height:1px; background:var(--rule-strong);
  }

  .gridline{
    position:absolute; left:96px; right:0; height:1px;
    background: var(--rule);
    z-index:1;
  }
  .gridline.major{ background: var(--rule-strong); height:1px; }

  #thread-svg{
    position:absolute; top:0; left:0; z-index:15; pointer-events:none;
  }

  .column{
    position:relative;
    flex: 0 0 258px;
    width:258px;
    border-right: 1px solid var(--rule);
    z-index:5;
  }
  .column-header{
    position:sticky; top:0;
    /* Must outrank entry cards, which the stagger pass assigns z-index 200
       (up to 1200 when selected/related, and 2000 on hover). At the old value
       of 22 the cards scrolled up over the top of their own column header. */
    z-index:3000;
    background: var(--card-bg);
    border-bottom: 2px solid var(--cat-color, var(--brass));
    /* Title and controls sit on one row, both vertically centred, rather than
       stacked. min-height holds every header to the same size whether its title
       runs to one line or wraps to two — without it, "Local & Regional Events"
       would make its column's header taller than its neighbours' and the row of
       sticky headers would sit ragged. */
    padding:10px 12px;
    min-height:62px;
    box-shadow: 0 2px 4px rgba(42,36,32,.08);
    display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:8px;
  }
  .column-header .name{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
    color: var(--ink);
    display:flex; align-items:center; gap:7px;
    /* Takes the leftover width and is allowed to shrink, so the controls keep
       their space even when the admin "+ add" button is present. */
    flex:1 1 auto; min-width:0;
  }
  .column-header .name .sw{
    width:10px; height:10px; border-radius:2px; background:var(--cat-color);
    flex:0 0 auto;
  }
  .column-header .name .cat-label{ min-width:0; }
  /* Rotated ("spine") label. Applied to this real span rather than to a bare
     text node — an anonymous flex item was part of the original fragility. */
  .column.collapsed .column-header .name .cat-label{
    display:block;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    white-space:nowrap;
    word-break:normal;
    overflow-wrap:normal;
    font-size:14px;
    line-height:1.2;
    letter-spacing:normal;
    margin:0 auto;
  }
  /* Now a sibling of the title on the same row rather than a row beneath it, so
     it takes only the width it needs and no top margin. */
  .column-header .meta-row{
    display:flex; justify-content:flex-end; align-items:center;
    margin-top:0;
    flex:0 0 auto;
  }
  .add-in-col{
    font-family:'Inter', sans-serif;
    font-size:10.5px;
  }

  .col-controls{
    display:flex; align-items:center; gap:5px;
  }
  .drag-handle{
    cursor: grab;
    color: var(--ink-faint);
    font-size:13px;
    line-height:1;
    padding:2px 3px;
    user-select:none;
  }
  .drag-handle:active{ cursor: grabbing; }
  .collapse-btn{
    background:none; border:1px solid var(--rule-strong); color:var(--ink-soft);
    font-size:11px; line-height:1; padding:3px 6px; border-radius:3px; font-weight:600;
  }
  .collapse-btn:hover{ background: var(--paper-deep); color:var(--ink); }

  .column.drag-over{
    box-shadow: inset 3px 0 0 var(--brass), inset -3px 0 0 var(--brass);
    background: rgba(168,134,47,0.06);
  }
  .column.dragging{ opacity:.45; }

  /* No overflow:hidden here. It made this column the containing block for
     position:sticky, which broke the header's stickiness — and since the
     collapsed header is height:100% of a column thousands of pixels tall, the
     label ended up pinned to the very top of the column and scrolled out of
     view (the board opens auto-scrolled to 1825). Entry cards are already
     display:none when collapsed, so there is nothing left to clip. */
  .column.collapsed{
    flex: 0 0 40px !important;
    width:40px !important;
  }
  /* Explicitly NOT centred, unlike the expanded header: this box is the full
     height of the column, so centring would strand the label halfway down it.
     The label handles its own placement by staying sticky at the top. */
  .column.collapsed .column-header{
    padding:10px 6px;
    height: 100%;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    justify-content:flex-start;
    cursor:pointer;
  }
  /* The collapsed header fills the column's full height, so it has no room to
     shift and cannot usefully stick on its own. Making the label itself sticky
     keeps it beside the column at every scroll position.
     Note the split of responsibilities: this wrapper handles ONLY stickiness
     and stays untransformed, while the rotation lives on the .cat-label span
     inside it. A transform here would create a new containing block and
     interfere with the sticky behaviour. */
  .column.collapsed .column-header .name{
    position:sticky;
    top:12px;
    display:block;
    transform:none;
    gap:0;
    padding:4px 0 6px;
    background: var(--card-bg);
    /* Must not inherit the expanded header's flex:1 1 auto — inside this
       column-direction, full-height header it would stretch the label to the
       column's entire height, leaving sticky no room to move and hiding it. */
    flex:0 0 auto;
  }
  .column.collapsed .column-header .name .sw{ display:none; }
  .column.collapsed .column-header .meta-row,
  .column.collapsed .add-in-col{ display:none; }
  .column.collapsed .drag-handle{ display:none; }
  .column.collapsed .entry-card{ display:none; }
  .column.collapsed .empty-col-msg{ display:none; }

  .entry-card{
    position:absolute;
    left:10px; right:10px;
    background: var(--card-bg);
    border-left: 4px solid var(--cat-color, var(--brass));
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding:7px 9px 7px 9px;
    cursor:pointer;
    transition: transform .1s ease, box-shadow .1s ease, opacity .15s;
    min-height:38px;
  }
  .entry-card:hover{ transform: translateY(-1px); box-shadow: 0 3px 10px rgba(42,36,32,.22); z-index: 2000 !important; }
  .entry-card .date-line{
    font-family:'Inter', sans-serif;
    font-size:10px;
    color: var(--ink-soft);
    letter-spacing:.02em;
  }
  .entry-card .title-line{
    font-size:12.5px;
    line-height:1.25;
    font-weight:600;
    color:var(--ink);
    margin-top:1px;
  }
  .entry-card.dimmed{ opacity:.22; }
  .entry-card.selected{
    outline: 2px solid var(--brass);
    outline-offset:1px;
    box-shadow: 0 4px 14px rgba(168,134,47,.4);
  }
  .entry-card.related{
    box-shadow: 0 0 0 2px rgba(168,134,47,.55), var(--shadow);
  }

  .empty-col-msg{
    position:absolute; top:14px; left:12px; right:12px;
    font-size:11.5px; color:var(--ink-faint); font-style:italic;
  }

  /* ---------- Detail / edit panel ---------- */
  .overlay{
    position:fixed; inset:0; background: rgba(20,16,12,.45);
    display:flex; align-items:flex-start; justify-content:flex-end;
    z-index:100;
  }
  .overlay.center{ align-items:center; justify-content:center; }
  .panel{
    background: var(--paper);
    width: 420px; max-width:92vw;
    height:100%;
    overflow-y:auto;
    box-shadow: -6px 0 24px rgba(0,0,0,.3);
    border-left:3px double var(--brass);
    padding: 22px 24px 30px;
  }
  /* The sliding detail panel only — the centred modals keep normal block flow.
     Flex column plus margin-top:auto on the footer bar drops the Report button
     and reference ID to the very bottom when an entry's content is short, while
     the bar's existing position:sticky keeps them in view on longer entries. */
  .panel:not(.modal){
    display:flex;
    flex-direction:column;
    padding-bottom:14px;
  }
  .panel.modal{
    height:auto; max-height:88vh;
    border-left:none;
    border-radius:4px;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
    border: 1px solid var(--rule-strong);
  }
  .panel h2{ font-size:20px; margin:0 0 2px; }
  .panel .cat-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Inter', sans-serif; font-size:11px;
    color: var(--ink-soft); text-transform:uppercase; letter-spacing:.06em;
    margin-bottom:10px;
  }

  /* Title block — a colored label at the head of the record, carrying the
     category's own color. Negative margins pull it flush to the panel's edges,
     cancelling the panel's padding, so it reads as a band rather than a box
     floating inside one. Both colors arrive as inline custom properties set per
     entry: --cat-color from the category, --titleblock-fg chosen against it. */
  .panel-titleblock{
    background: var(--cat-color, var(--ink));
    color: var(--titleblock-fg, #F3ECDA);
    margin:-22px -24px 18px;
    padding:20px 24px 17px;
    flex:0 0 auto;
  }
  .panel-titleblock h2{
    color: inherit;
    margin:0;
    line-height:1.25;
  }
  .panel-titleblock .cat-tag{
    color: inherit;
    opacity:.8;
    margin-bottom:5px;
  }
  .panel .cat-tag .sw{ width:9px; height:9px; border-radius:2px; }
  .panel .field{ margin-bottom:14px; }
  .panel .field label{
    display:block; font-family:'Inter', sans-serif; font-size:10.5px;
    text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:5px;
  }
  /* Reading panel only. The modal forms reuse .field, and opening these up there
     would make an already long entry form considerably taller. */
  .panel:not(.modal) .field{ margin-bottom:24px; }
  .panel:not(.modal) .field label{ margin-bottom:7px; }
  .panel .field .val{ font-size:14px; line-height:1.5; }
  .source-link{
    font-family:'Inter', sans-serif;
    font-size:11.5px;
    color: var(--brass-dark);
    text-decoration:none;
    white-space:nowrap;
    border-bottom:1px dotted var(--brass-dark);
  }
  .source-link:hover{ color: var(--brass); border-bottom-style:solid; }
  .sources-list{ display:flex; flex-direction:column; gap:8px; }
  .source-item{ font-size:14px; line-height:1.45; }
  .source-row{
    display:flex; gap:6px; margin-bottom:7px;
  }
  .source-row .src-text{ flex:1.2; }
  .source-row .src-url{ flex:1; }
  .source-row .remove-source-row{
    flex:0 0 auto; font-size:16px; padding:4px 9px; color:var(--ink-soft);
    border:1px solid var(--rule-strong); border-radius:var(--radius);
  }
  .source-row .remove-source-row:hover{ color:#a33; border-color:#a33; }

  .tag-input{
    border:1px solid var(--rule-strong); border-radius:var(--radius);
    background:var(--card-bg); padding:6px 7px; position:relative;
  }
  .tag-input:focus-within{ border-color: var(--brass); }
  .tag-chips{
    display:flex; flex-wrap:wrap; gap:5px;
  }
  .tag-chips:not(:empty){ margin-bottom:5px; }
  .tag-chip{
    background: var(--paper-deep); border:1px solid var(--rule-strong);
    border-radius:20px; padding:3px 5px 3px 10px;
    font-size:12px; font-family:'Inter', sans-serif;
    display:inline-flex; align-items:center; gap:5px;
  }
  .tag-chip-remove{
    background:none; border:none; color:var(--ink-soft);
    cursor:pointer; font-size:14px; line-height:1; padding:0 3px;
  }
  .tag-chip-remove:hover{ color:#a33; }
  #peopleTextInput{
    border:none; outline:none; background:transparent;
    font-family:'Inter', sans-serif; font-size:13.5px;
    width:100%; padding:3px 2px;
  }
  .tag-suggestions{
    position:absolute; left:0; right:0; top:100%; margin-top:3px;
    background:var(--card-bg); border:1px solid var(--rule-strong);
    border-radius:var(--radius); box-shadow:var(--shadow);
    z-index:60; max-height:160px; overflow-y:auto;
  }
  .tag-suggestion{ padding:7px 10px; font-size:13px; cursor:pointer; }
  .tag-suggestion:hover{ background: var(--paper-deep); }
  .panel .field textarea, .panel .field input, .panel .field select{
    width:100%; font-family:'Inter',sans-serif; font-size:13.5px;
    padding:8px 9px; border:1px solid var(--rule-strong); border-radius:var(--radius);
    background:var(--card-bg); color:var(--ink);
  }
  .panel .field textarea{ min-height:80px; resize:vertical; }
  /* Explanatory sentence under a field label. Labels are uppercase and
     letterspaced, which is unreadable for anything longer than a few words, so
     guidance goes here in ordinary sentence case instead. */
  .panel .field-hint{
    font-size:12px;
    line-height:1.5;
    color: var(--ink-soft);
    margin:0 0 7px;
  }
  .panel .field-hint .eg{ color: var(--ink-faint); font-style:italic; }
  /* Divides the record itself (dates, notes, sources, people, themes) from the
     "Nearby in time" navigation below it. Matches the dashed rule already used
     above Additional Notes. */
  .panel-rule{
    border:none;
    border-top:1px dashed var(--rule-strong);
    margin:20px 0 16px;
  }
  .row3{ display:flex; gap:8px; }
  .row3 > div{ flex:1; }
  .people-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
  .people-tags .ptag{
    background: var(--paper-deep); border:1px solid var(--rule-strong);
    font-family:'Inter', sans-serif; font-size:11px; padding:3px 8px; border-radius:20px;
    cursor:pointer;
  }
  .panel .actions{ display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; }
  .panel .close-x{
    position:absolute; top:16px; right:18px; background:none; border:none;
    color:var(--ink-soft); font-size:20px; cursor:pointer; padding:2px 8px;
  }
  .panel .close-x:hover{ color:var(--ink); }
  /* Sits on top of the colored title block in the detail panel, so it takes the
     block's foreground color rather than the panel's ink. */
  .panel:not(.modal) .close-x{ color: var(--titleblock-fg, #F3ECDA); opacity:.75; }
  .panel:not(.modal) .close-x:hover{ color: var(--titleblock-fg, #F3ECDA); opacity:1; }
  .panel-relative{ position:relative; }

  .related-list{ margin-top:6px; display:flex; flex-direction:column; gap:6px; }
  .nearby-controls{
    display:flex; align-items:center; gap:9px;
    margin: 6px 0 10px;
  }
  .nearby-controls input[type=range]{
    flex:1; accent-color: var(--brass);
  }
  .nearby-controls input[type=number]{
    width:48px; text-align:center; padding:5px 4px;
    font-family:'Inter', sans-serif; font-size:12.5px;
  }
  .nearby-controls .nearby-unit{
    font-family:'Inter', sans-serif; font-size:11px; color:var(--ink-soft);
  }
  .related-item{
    border:1px solid var(--rule-strong); border-left:4px solid var(--cat-color);
    background:var(--card-bg); border-radius:var(--radius); padding:6px 9px; cursor:pointer;
  }
  .related-item:hover{ background:var(--paper-deep); }
  .related-item .rd{ font-family:'Inter', sans-serif; font-size:10px; color:var(--ink-soft); }
  .related-item .rt{ font-size:12px; font-weight:600; }

  .cat-manage-row{
    display:flex; align-items:center; gap:8px; margin-bottom:8px;
    border:1px solid var(--rule-strong); border-radius:var(--radius); padding:7px 9px; background:var(--card-bg);
  }
  .cat-manage-row input[type=text]{ flex:1; border:none; background:transparent; font-size:13px; padding:2px; }
  .cat-manage-row input[type=color]{ width:26px; height:26px; padding:0; border:none; background:none; cursor:pointer; }

  .empty-state{
    text-align:center; padding: 60px 30px; color:var(--ink-soft);
  }
  .empty-state h2{ color:var(--ink); }

  ::-webkit-scrollbar{ width:11px; height:11px; }
  ::-webkit-scrollbar-track{ background: var(--paper-dark); }
  ::-webkit-scrollbar-thumb{ background: var(--rule-strong); border-radius:6px; border:2px solid var(--paper-dark); }
  ::-webkit-scrollbar-thumb:hover{ background: var(--brass); }

  footer.hint{
    font-family:'Inter', sans-serif;
    font-size:10.5px; color: var(--ink-faint);
    padding: 6px 22px; background: var(--paper-dark); border-top:1px solid var(--rule);
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  footer.hint #hintFooterText{ min-width:0; }

  a{ color: var(--brass-dark); }

  /* ---------- Focus panel ---------- */

  .focus-toggle-btn{
    background:#fff;
    border:none;
    color: var(--ink);
    font-family:'Inter', sans-serif;
    font-size:11px;
    height: var(--control-h);
    padding:0 14px;
    border-radius:20px;
    cursor:pointer;
    letter-spacing:.05em;
    display:inline-flex; align-items:center; gap:7px;
  }
  /* The manicule is set larger than the label and in brass, so it reads as a
     mark rather than a character sitting in the text. Line-height is pinned to 1
     so the taller glyph doesn't stretch the button. */
  /* Size and resting colour are shared with the detail panel's Add to Focus
     button so the two glyphs stay identical. Their state colours differ — the
     header pill sits on dark blue, the panel one on cream paper — so those are
     defined separately with each button. */
  .focus-toggle-btn .fi-hand,
  .focus-pin-action .fi-hand{
    font-size:19px;
    line-height:1;
    color: var(--brass);
  }
  .focus-toggle-btn:hover{ background: var(--paper); }
  .focus-toggle-btn.on{
    background: var(--brass); color:#2A2420; font-weight:700;
  }
  .focus-toggle-btn.on .fi-hand{ color:#2A2420; }
  .focus-toggle-btn.on:hover{ background: var(--brass-dark); color:#F3E9D0; }
  .focus-toggle-btn.on:hover .fi-hand{ color:#F3E9D0; }

  .focus-panel{
    width:0;
    flex:0 0 auto;
    overflow:hidden;
    background: linear-gradient(180deg, #17282b 0%, #1e3236 100%);
    border-left: 3px double #3f8a99;
    transition: width .22s ease;
  }
  .focus-panel.open{ width:340px; }
  .focus-panel.drag-over{ background: linear-gradient(180deg, #1c3a3f 0%, #244045 100%); }
  .focus-panel-inner{
    width:340px;
    height:100%;
    display:flex;
    flex-direction:column;
    padding:16px 16px 14px;
    overflow-y:auto;
    color:#dcecee;
  }
  .focus-header-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .focus-header-row h3{
    font-family:'Fraunces', serif; font-size:16px; font-weight:600;
    color:#eaf6f8; margin:0;
  }
  .focus-close-x{
    background:none; border:none; color:#9ecad1; font-size:19px; cursor:pointer; padding:0 4px;
  }
  .focus-close-x:hover{ color:#eaf6f8; }
  .focus-sub{
    font-family:'Inter', sans-serif; font-size:10.5px; color:#7fa8ae;
    text-transform:uppercase; letter-spacing:.07em; margin:10px 0 5px;
  }
  .focus-title-input, .focus-notes-textarea{
    width:100%; font-family:'Inter', sans-serif; font-size:13px;
    background: rgba(255,255,255,0.06); border:1px solid #3f6167; border-radius:3px;
    color:#eaf6f8; padding:7px 9px;
  }
  .focus-title-input::placeholder, .focus-notes-textarea::placeholder{ color:#6f9299; }
  .focus-notes-textarea{ min-height:64px; resize:vertical; font-size:12.5px; line-height:1.45; }
  .focus-title-input:focus, .focus-notes-textarea:focus{ outline:1px solid #3f8a99; }

  .focus-list{
    display:flex; flex-direction:column; gap:7px;
    margin:8px 0 4px;
    flex:1;
  }
  .focus-empty{
    font-family:'Inter', sans-serif; font-size:11.5px; color:#7fa8ae;
    font-style:italic; padding:10px 2px; line-height:1.5;
  }
  .focus-item{
    background: rgba(255,255,255,0.05);
    border-left:4px solid var(--cat-color, #3f8a99);
    border-radius:3px;
    padding:7px 8px 7px 10px;
    cursor:pointer;
    display:flex; align-items:flex-start; justify-content:space-between; gap:6px;
  }
  .focus-item:hover{ background: rgba(255,255,255,0.09); }
  .focus-item .fi-text{ min-width:0; }
  .focus-item .fi-date{ font-family:'Inter', sans-serif; font-size:10px; color:#9ecad1; }
  .focus-item .fi-title{ font-size:12.5px; color:#eaf6f8; line-height:1.3; margin-top:1px; }
  .focus-item .fi-remove{
    flex:0 0 auto; background:none; border:none; color:#7fa8ae; font-size:15px; cursor:pointer; padding:0 2px;
  }
  .focus-item .fi-remove:hover{ color:#ff8a7a; }

  .focus-actions{
    display:flex; flex-direction:column; gap:7px; margin-top:12px;
    padding-top:12px; border-top:1px solid #2d484d;
  }
  .focus-actions button{
    font-family:'Inter', sans-serif; font-size:11px;
    background: rgba(255,255,255,0.06); border:1px solid #3f6167; color:#dcecee;
    padding:8px 10px; border-radius:3px; cursor:pointer; text-align:left;
  }
  .focus-actions button:hover{ background: rgba(255,255,255,0.13); }
  .focus-actions button.danger:hover{ background: rgba(255,110,90,0.18); color:#ffb3a3; border-color:#a35449; }

  .pin-btn{
    position:absolute; top:5px; right:6px;
    width:16px; height:16px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(63,138,153,0.85); color:#fff;
    font-size:10px; line-height:1; border:none; cursor:pointer;
    opacity:0; transition: opacity .12s;
  }
  .entry-card:hover .pin-btn{ opacity:0.9; }
  .pin-btn:hover{ opacity:1 !important; background:#3f8a99; }
  .pin-btn.pinned{ opacity:0.9; background:#c9a227; }
  .pin-btn.pinned:hover{ background:#a8862f; }
  .entry-card.in-focus{ box-shadow: 0 0 0 2px #3f8a99, var(--shadow); }

  /* Sibling of the header's Focus toggle: same pill shape, height, icon size and
     brass-fill active state. It carries a hairline border the header button does
     not, because it sits on cream paper rather than dark blue — a borderless
     white pill would have no edge to read against. The !important flags override
     button.ghost, which is more specific than this class alone. */
  /* Four states, all kept above AA contrast:
       default          transparent, so it sits quietly on the panel
       hover            brass-dark fill, cream text     4.73:1
       pinned           brass-dark fill, cream text     4.73:1
       pinned + hover   lighter brass fill, ink text    4.46:1
     The two filled tones are deliberate rather than decorative: cream needs the
     darker brass to stay legible and ink needs the lighter one, so hovering a
     pinned button lightens the fill as its text darkens. Filling on hover also
     previews what pinning will look like. The !important flags override
     button.ghost, which is more specific than this class on its own. */
  .focus-pin-action{
    background: transparent !important;
    color: var(--ink) !important;
    border:1px solid var(--rule-strong) !important;
    height: var(--control-h);
    padding:0 14px;
    border-radius:20px;
    font-size:11px;
    letter-spacing:.05em;
    display:inline-flex; align-items:center; gap:7px;
  }
  .focus-pin-action:hover{
    background: var(--brass-dark) !important;
    color:#F3E9D0 !important;
    border-color: var(--brass-dark) !important;
  }
  .focus-pin-action.pinned{
    background: var(--brass-dark) !important;
    color:#F3E9D0 !important;
    border-color: var(--brass-dark) !important;
    font-weight:700;
  }
  .focus-pin-action.pinned:hover{
    background: var(--brass) !important;
    color:#2A2420 !important;
    border-color: var(--brass) !important;
  }
  /* Icon follows the label through all four states. Ordered so the more
     specific .pinned:hover rule lands last and wins. */
  .focus-pin-action:hover .fi-hand{ color:#F3E9D0; }
  .focus-pin-action.pinned .fi-hand{ color:#F3E9D0; }
  .focus-pin-action.pinned:hover .fi-hand{ color:#2A2420; }

  @media (max-width: 720px){
    .panel{ width:100%; }
    .toolbar input[type=text]{ width:150px; }
    .focus-panel.open{ width:78vw; }
    .focus-panel-inner{ width:78vw; }
  }
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <h1>Joseph Smith MultiTimeline</h1>
    <div class="subtitle">A Research Board for the Life of Joseph Smith</div>
    <div class="header-spacer"></div>
    <button id="focusToggleBtn" class="focus-toggle-btn" title="Open your Focus workspace — pin entries to build your own thread or theory"><span class="fi-hand">&#9758;</span><span>Focus</span></button>
    <button id="adminToggleBtn" class="admin-toggle">&#9919; Admin</button>
  </header>

  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Search titles, notes, people…">
    <select id="personFilter"><option value="">All people</option></select>
    <select id="themeFilter"><option value="">All themes</option></select>
    <label class="small">Zoom <input type="range" id="zoomSlider" min="30" max="200" value="80"></label>
    <button class="ghost thread-toggle" id="threadToggleBtn" title="Draw one line through every visible entry, in chronological order"><svg class="thread-icon-svg" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">thread-roll-filled</title><path fill="#8c2e22" d="M6 12.59L11.59 7H6zm12-1.18L12.41 17H18zM18 7h-3.59L6 15.41V17h3.59L18 8.59z"/><rect width="16" height="3" x="4" y="2" fill="#8c2e22" rx=".75" ry=".75"/><rect width="16" height="3" x="4" y="19" fill="#8c2e22" rx=".75" ry=".75"/></svg> Thread: Off</button>
    <label class="small" style="gap:8px;">Position by
      <div class="seg-toggle" id="positionToggle">
        <button type="button" class="seg-btn on" data-mode="event">Event date</button>
        <button type="button" class="seg-btn" data-mode="recorded">First recorded</button>
      </div>
    </label>
    <div class="spacer"></div>
    <div id="adminControls" style="display:none; gap:8px; align-items:center;">
      <button class="ghost" id="manageCatsBtn">Manage categories</button>
      <button class="ghost" id="manageThemesBtn">Manage themes</button>
      <button class="ghost" id="exportBtn">Export JSON</button>
      <button class="ghost" id="importBtn">Import JSON</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
      <button id="addEntryBtn">+ Add entry</button>
    </div>
  </div>

  <div id="main-row">
    <div id="board-wrap">
      <div id="board-inner">
        <div id="rail"></div>
        <!-- columns injected here -->
      </div>
    </div>

    <div id="focusPanel" class="focus-panel">
      <div class="focus-panel-inner" id="focusPanelInner"></div>
    </div>
  </div>

  <footer class="hint" id="hintFooter">
    <span id="hintFooterText">Click any entry for details and nearby events. Browsing is open to everyone — unlock Admin above to add, edit, or reorganize.</span>
    <button type="button" class="report-flag-btn" id="reportGeneralBtn" title="Report a problem or suggest a correction">&#9873; Report an issue</button>
  </footer>
</div>

<script>

    {cat:'personal', y:1823, m:9, d:21, title:'First visit from the angel Moroni', people:['Joseph Smith'], desc:'Reports repeated nighttime visits from a heavenly messenger describing buried gold plates.', sources:[
      {text:'Oliver Cowdery, "Letter IV," Messenger and Advocate, Feb. 1835 (written with JS\'s direction/approval, later copied into JS\'s own journal-history)', url:'https://www.josephsmithpapers.org/paper-summary/history-1834-1836/69'},
      {text:'Joseph Smith, History, 1838–1856, vol. A-1, pp. 4–5 (later published as Joseph Smith—History 1:27–54)', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/4'}
    ]},
    {cat:'personal', y:1825, approx:true, title:'Hired by Josiah Stowell', people:['Josiah Stowell'], desc:'Works in Pennsylvania for Stowell, participating in local treasure-seeking ventures.', sources:[
      {text:'"State of New York v. JS–A," Chenango Co. Justice of the Peace Court, 20 Mar. 1826 — the only two surviving contemporary documents are the fee bills of Justice Albert Neely and Constable Philip De Zeng', url:'https://www.josephsmithpapers.org/paper-summary/introduction-to-state-of-new-york-v-js-a/1'}
    ], researchNotes:'No trial transcript survives. The two contemporary documents are the fee bills of Justice Albert Neely and Constable Philip De Zeng. Other accounts of what was said at the proceeding were published later: a letter from Abram W. Benton in 1831, and an account by W. D. Purple in 1877. The two later accounts do not agree with each other on details.'},
    {cat:'personal', y:1827, m:1, d:18, title:'Marries Emma Hale', people:['Emma Hale Smith'], desc:'Marries Emma Hale in South Bainbridge, New York, against her father\'s wishes.', sources:[
      {text:'Joseph Smith, History, 1838–1856, vol. A-1, p. 8 ("On the eighteenth of January...we were married")', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/8'}
    ]},
    {cat:'personal', y:1827, m:9, d:22, title:'Receives the plates from Moroni', people:['Joseph Smith'], desc:'Reports finally receiving the gold plates at the Hill Cumorah.', sources:[
      {text:'Joseph Smith, History, 1838–1856, vol. A-1 (later published as Joseph Smith—History 1:59)', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/1'}
    ]},
    {cat:'personal', y:1828, m:6, approx:true, title:'Birth and death of son Alvin', people:['Emma Hale Smith'], desc:'First child dies shortly after birth.', sources:[
      {text:'Lucy Mack Smith, History, 1844–1845, bk. 10 — writes that the baby "was very soon snatched from her arms and borne aloft to the world of spirits"', url:'https://www.josephsmithpapers.org/paper-summary/lucy-mack-smith-history-1844-1845/1'},
      {text:'Sophia Lewis, Statement, in "Mormonism," Susquehanna Register, and Northern Pennsylvanian, 1 May 1834', url:'https://www.josephsmithpapers.org/paper-summary/revelation-july-1828-dc-3/1'}
    ], researchNotes:'Lucy Mack Smith was not present at the birth; she wrote this account roughly 16 years later, as Joseph Smith\'s mother. Sophia Lewis published her statement in 1834, about 6 years after the event; she was not a supporter of the Smith family, and her claim to have been present is not corroborated elsewhere.'},
    {cat:'personal', y:1831, m:2, approx:true, title:'Relocates to Kirtland, Ohio', people:['Emma Hale Smith'], desc:'Moves the family household to the growing gathering place in Kirtland.', sources:[
      {text:'Revelation, 30 December 1830 [D&C 37] — dictated near Fayette, NY, formally directing the move to Ohio', url:'https://www.josephsmithpapers.org/paper-summary/revelation-30-december-1830-dc-37/1'}
    ]},
    {cat:'personal', y:1832, m:3, d:24, title:'Tarred and feathered in Hiram, Ohio', people:['Sidney Rigdon'], desc:'A mob drags him from his home at night and beats, tars, and feathers him.', sources:[
      {text:'Joseph Smith, History, 1838–1856, vol. A-1 (his own detailed account of the mobbing and the sermon he preached the next morning)', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/1'}
    ]},
    {cat:'personal', y:1838, m:3, approx:true, title:'Family moves to Far West, Missouri', people:['Emma Hale Smith'], desc:'Relocates amid rising tension between Missouri settlers and church members.', sources:[
      {text:'Joseph Smith, History, 1838–1856, vol. B-1 [1 Sept. 1834–2 Nov. 1838] — his own manuscript history covering this period', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-b-1-1-september-1834-2-november-1838/1'}
    ]},
    {cat:'personal', y:1838, m:12, approx:true, title:'Imprisoned in Liberty Jail', people:['Hyrum Smith'], desc:'Held through the winter of 1838–39 on charges stemming from the Missouri conflict.', sources:[
      {text:'Joseph Smith et al., Letter to the Church and Edward Partridge, 20 March 1839 — written from inside Liberty Jail; excerpts later canonized as D&C 121–123', url:'https://www.josephsmithpapers.org/paper-summary/letter-to-the-church-and-edward-partridge-20-march-1839/1'}
    ]},
    {cat:'personal', y:1839, m:5, approx:true, title:'Family settles in Commerce (Nauvoo), Illinois', people:['Emma Hale Smith'], desc:'After escaping Missouri custody, resettles the family on the Mississippi River bend.', sources:[
      {text:'Joseph Smith, History, 1838–1856, vol. C-1 [2 Nov. 1838–31 July 1842] — his own manuscript history covering the Commerce/Nauvoo settlement', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-c-1-2-november-1838-31-july-1842/1'}
    ]},
    {cat:'personal', y:1843, approx:true, title:'Plural marriage discussed within inner circle', people:['Emma Hale Smith'], desc:'Practice of plural marriage becomes a source of private tension, including with Emma.', sources:[
      {text:'Revelation, 12 July 1843 [D&C 132] — JSP\'s annotation, drawing on William Clayton\'s journal and 1874 affidavit, describes the private conversation between JS, Hyrum, and Clayton immediately before the revelation was dictated', url:'https://www.josephsmithpapers.org/paper-summary/revelation-12-july-1843-dc-132/1'}
    ]},
    {cat:'personal', y:1844, m:6, d:27, title:'Killed at Carthage Jail', people:['Hyrum Smith'], desc:'Shot and killed by an armed mob while awaiting trial in Carthage, Illinois.', sources:[
      {text:'Willard Richards, Journal Excerpt, 23–27 June 1844 — written by an eyewitness who was in the room; also published as "Two Minutes in Jail," Times and Seasons, 1 Aug. 1844', url:'https://www.josephsmithpapers.org/paper-summary/appendix-3-willard-richards-journal-excerpt-23-27-june-1844/19'}
    ]},

    {cat:'acquaint', y:1827, m:4, approx:true, title:'Martin Harris becomes early supporter', people:['Martin Harris'], desc:'A prosperous Palmyra farmer who becomes an early believer and financial backer.', sources:[

    {cat:'acquaint', y:1832, m:4, approx:true, title:'Brigham Young joins the church', people:['Brigham Young'], desc:'A Mendon, New York carpenter who is baptized and later leads the Quorum of the Twelve.', sources:[

    {cat:'acquaint', y:1837, approx:true, title:'Falling-out after Kirtland Bank failure', people:['Oliver Cowdery','David Whitmer'], desc:'Several early associates, including Cowdery and Whitmer, distance themselves amid the financial collapse.', sources:[

    ]},

    ]},

    // ---- Revelations & Scripture ----
    {cat:'revelations', y:1823, m:9, d:22, recordedY:1832, recordedApprox:true, title:'Angelic instruction begins', people:['Joseph Smith'], desc:'Reports the beginning of repeated visits from an angel conveying historical and religious instruction over the four years before the plates were received.', sources:[
      {text:'Joseph Smith, "History, circa Summer 1832" — the earliest surviving account, partly in JS\'s own handwriting, which mentions the visits of an angel and the coming forth of the record', url:'https://www.josephsmithpapers.org/paper-summary/history-circa-summer-1832/1'},
      {text:'Joseph Smith, History, 1838–1856, vol. A-1, pp. 4–5 — the fuller narrative, later published as Joseph Smith—History 1:27–54', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/4'}
    ], researchNotes:'The Joseph Smith Papers notes that almost no original records survive from JS\'s life between 1805 and 1827, so every account of the 1823 visits is reminiscent. The two earliest are his own histories of circa summer 1832 and 1838–39, written roughly nine and fifteen years after the events they describe. The first-recorded date on this entry is set to 1832 on that basis.\n\nThe date itself comes from later accounts: JSP states that Moroni first appeared late in the night of 21–22 September 1823. The related Personal Life entry for the first visit is dated 21 September and this entry, covering the instruction that followed, 22 September.'},
    {cat:'revelations', y:1828, m:4, d:12, approx:true, title:'Translation work begins in Harmony, PA', people:['Martin Harris'], desc:'Dictation of the Book of Mormon text begins at Harmony, Pennsylvania, with Martin Harris as scribe. The resulting manuscript — later described as 116 pages — was lost after Harris took it to Palmyra to show his family.', sources:[
      {text:'Original Manuscript of the Book of Mormon, circa 12 April 1828–circa 1 July 1829 — the surviving dictation manuscript, whose date range begins with this work', url:'https://www.josephsmithpapers.org/paper-summary/original-manuscript-of-the-book-of-mormon-circa-12-april-1828-circa-1-july-1829/1'},
      {text:'Revelation, July 1828 [D&C 3] — dictated after the loss of the manuscript pages', url:'https://www.josephsmithpapers.org/paper-summary/revelation-july-1828-dc-3/1'},
      {text:'Preface to the Book of Mormon, circa August 1829 — where the number of lost pages is first specified as 116', url:'https://www.josephsmithpapers.org/paper-summary/preface-to-book-of-mormon-circa-august-1829/1'}
    ], researchNotes:'Date corrected from January 1828 to circa 12 April 1828. The Joseph Smith Papers date Martin Harris\'s work as scribe to approximately 12 April – 14 June 1828, and title the surviving dictation manuscript "circa 12 April 1828–circa 1 July 1829." The earlier part of 1828 included the trip to show transcribed characters to Charles Anthon in New York, which is a separate event from the start of dictation.\n\nThe figure of 116 pages appears first in the preface to the 1830 Book of Mormon, written about a year after the loss; the pages themselves have never been recovered, so the number rests on that statement.'},
    {cat:'revelations', y:1829, m:5, d:15, recordedY:1832, recordedApprox:true, title:'Reports receiving the Aaronic Priesthood', people:['Oliver Cowdery'], desc:'JS and Oliver Cowdery report that John the Baptist appeared and conferred the "priesthood of Aaron," authorising them to baptise, after which they baptised each other in the Susquehanna River near Harmony, Pennsylvania.', sources:[
      {text:'Joseph Smith, "History, circa Summer 1832" — the earliest surviving record, mentioning the reception of priesthood by the ministering of angels; it does not name a date or the messenger', url:'https://www.josephsmithpapers.org/paper-summary/history-circa-summer-1832/1'},
      {text:'Oliver Cowdery, account in Patriarchal Blessings, 1:8–9, probably recorded summer or autumn 1835 — the earliest known record naming "Fryday, the 15th day of May, 1829," Harmony, and the baptisms that followed', url:'https://www.josephsmithpapers.org/site/priesthood-restoration'},
      {text:'Joseph Smith, History, 1838–1856, vol. A-1, pp. 17–18 — the fullest narrative account', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/23'},
      {text:'Revelation, circa August 1835 [D&C 27:8–14] — the published 1835 text naming John the Baptist; it is a revised and expanded version of a revelation originally dating to circa August 1830', url:'https://www.josephsmithpapers.org/paper-summary/revelation-circa-august-1835-dc-27/2'}
    ], researchNotes:'No record made in 1829 describes this event. The earliest surviving reference is JS\'s circa summer 1832 history, which mentions receiving priesthood through the ministering of angels without naming a date or a messenger; the first-recorded date on this entry is set to 1832 on that basis, replacing an earlier value of 1838.\n\nThe earliest known record giving the specific date is Oliver Cowdery\'s account in the Patriarchal Blessings book, probably written in summer or autumn 1835 — about six years after the event. The text naming John the Baptist in D&C 27 is the 1835 published version; the Joseph Smith Papers describes it as a revised and expanded form of a revelation originally dating to circa August 1830.\n\nThe Joseph Smith Papers maintains a finding aid, "Priesthood Restoration," compiling the earliest records describing or alluding to these events; it is cited above as the source for the Patriarchal Blessings text, which is not separately imaged on the site.'},
    {cat:'revelations', y:1829, m:6, approx:true, recordedY:1832, recordedApprox:true, title:'Reports receiving the Melchizedek Priesthood', people:['Oliver Cowdery'], desc:'A higher authority, later called the Melchizedek Priesthood, is reported as conferred after the Aaronic. The surviving records describe this in two different ways and none of them fixes a date.', sources:[
      {text:'Joseph Smith, "History, circa Summer 1832" — the earliest surviving record, referring to a confirmation and reception of the high priesthood', url:'https://www.josephsmithpapers.org/paper-summary/history-circa-summer-1832/1'},
      {text:'Minutes and Discourse, 21 April 1834 (Minute Book 1) — JS\'s account of "the revelation of the priesthood of Aaron" and "the revelation of the high priesthood"', url:'https://www.josephsmithpapers.org/paper-summary/minutes-and-discourse-21-april-1834/2'},
      {text:'Letter to the Church, 7 September 1842 [D&C 128:20–21] — JS summarises the restoration of priesthood and keys, mentioning Peter, James and John, and the voice of God in the chamber of "Father Whitmer"', url:'https://www.josephsmithpapers.org/paper-summary/letter-to-the-church-of-jesus-christ-of-latter-day-saints-6-september-1842-dc-128/7'},
      {text:'Joseph Smith Papers, "Priesthood Restoration" — finding aid compiling the earliest records describing or alluding to the restoration of authority', url:'https://www.josephsmithpapers.org/site/priesthood-restoration'}
    ], researchNotes:'The Joseph Smith Papers states that historical records describing the reception of this higher authority are "generally less specific and more complex" than those for the Aaronic Priesthood, and the surviving accounts differ in kind: some describe Peter, James and John appearing and conferring a higher priesthood, while others describe an earlier event at the home of Peter Whitmer Sr. in which the voice of God commanded JS and Cowdery to ordain one another to the office of elder in a public meeting.\n\nNo surviving record fixes a date for the event. The June 1829 date on this entry is approximate and derives from its placement relative to the Aaronic Priesthood account rather than from a document. As with that entry, the earliest surviving reference is the circa summer 1832 history, so the first-recorded date is set to 1832, replacing an earlier value of 1838.'},
    {cat:'revelations', y:1830, m:3, d:26, title:'Book of Mormon published', people:['Martin Harris'], desc:'Printing is completed at E. B. Grandin\'s shop in Palmyra and copies are first offered for sale, financed by Martin Harris against the mortgage of his farm.', sources:[
      {text:'Book of Mormon, 1830 — the first edition itself', url:'https://www.josephsmithpapers.org/paper-summary/book-of-mormon-1830/1'},
      {text:'Agreement with Martin Harris, 16 January 1830 — the arrangement securing Harris\'s financing of the printing', url:'https://www.josephsmithpapers.org/paper-summary/agreement-with-martin-harris-16-january-1830/1'},
      {text:'Advertisement, Wayne Sentinel (Palmyra, NY), 26 Mar. 1830 — Grandin offers the book for sale, retail and wholesale, at his bookstore'}
    ], researchNotes:'The publication date rests on the advertisement placed in the Wayne Sentinel, a newspaper printed in the same shop, offering the completed book for sale on 26 March 1830 — a commercial notice rather than a retrospective account, and contemporary with the event.\n\nThe third citation above is given without a link because the newspaper page is not separately imaged on the Joseph Smith Papers site.'},
    {cat:'revelations', y:1832, m:12, d:27, title:'"Olive Leaf" revelation dictated', people:[], desc:'A lengthy revelation dictated at a conference of high priests in Kirtland, connecting light, truth and creation, and directing the elders to hold a solemn assembly, build a house of God, and establish a school for the prophets. Later canonized as Doctrine and Covenants 88.', sources:[
      {text:'Revelation, 27–28 December 1832 [D&C 88:1–126] — earliest surviving copy, inscribed in Revelation Book 2 in the handwriting of Frederick G. Williams', url:'https://www.josephsmithpapers.org/paper-summary/revelation-27-28-december-1832-dc-881-126/1'},
      {text:'Letter to William W. Phelps, 11 January 1833 — where JS calls it "the Olieve leaf which we have plucked from the tree of Paradise"', url:'https://www.josephsmithpapers.org/paper-summary/letter-to-william-w-phelps-11-january-1833'}
    ], researchNotes:'Date corrected from December 1831 to 27–28 December 1832. The Joseph Smith Papers date this revelation to a conference of high priests held in Kirtland on those two days. The original manuscript is not extant; the earliest surviving copy was inscribed in Revelation Book 2 by Frederick G. Williams, probably between late January and late February 1833. A separate revelation of 3 January 1833 (D&C 88:127–137) was later combined with it in print. Part of the text was published in The Evening and the Morning Star in February 1833, and the full text on a broadside in late 1833 or early 1834.'},
    {cat:'revelations', y:1832, m:2, d:16, title:'Vision of the three degrees of glory', people:['Sidney Rigdon'], desc:'JS and Sidney Rigdon report a joint vision of the afterlife while revising the New Testament at the John and Alice Johnson home in Hiram, Ohio, describing three degrees of glory — celestial, terrestrial and telestial. Later canonized as Doctrine and Covenants 76.', sources:[
      {text:'Vision, 16 February 1832 [D&C 76] — earliest extant copy, inscribed in Revelation Book 2 in the handwriting of Frederick G. Williams with several lines by JS, and signed by Rigdon and JS', url:'https://www.josephsmithpapers.org/paper-summary/vision-16-february-1832-dc-76/1'}
    ], researchNotes:'The account was copied into Revelation Book 2 probably during February or March 1832, within weeks of the reported vision. Rigdon\'s signature precedes JS\'s on the record, which the Joseph Smith Papers notes is consistent with Rigdon having acted as scribe; the extant record shows no other revelatory text signed in this way. The account was published in The Evening and the Morning Star in July 1832. Philo Dibble, who said he was present in the room, gave accounts in 1877, 1882 and 1892 that differ from one another; his description of how the vision proceeded appears only in the 1892 telling, sixty years after the event.'},
    {cat:'revelations', y:1833, m:2, d:27, title:'Word of Wisdom revelation recorded', people:['Emma Hale Smith'], desc:'A revelation dictated at Kirtland counselling against tobacco, wine, "strong drinks" and "hot drinks," and recommending grains, herbs and fruit, with meat used sparingly. Later canonized as Doctrine and Covenants 89.', sources:[
      {text:'Revelation, 27 February 1833 [D&C 89] — featured version titled "A Word of Wisdom," copied circa June 1833 into Sidney Gilbert\'s notebook in Gilbert\'s handwriting', url:'https://www.josephsmithpapers.org/paper-summary/revelation-27-february-1833-dc-89/1'}
    ], researchNotes:'On the circumstances usually given for the revelation: the Joseph Smith Papers attributes the account of heavy tobacco use in the School of the Prophets, and of Emma Smith and others objecting to cleaning tobacco juice from the floor, to Brigham Young. Young did not attend the school when the revelation was recorded and stated he had the information from those who were there; his account is a discourse of 8 February 1868, thirty-five years afterwards.\n\nZebedee Coltrin, who was present, recalled JS coming out of the translating room and reading the revelation to the school. Coltrin\'s recollections were recorded in 1883, fifty years afterwards, and give the number in attendance as twenty-one in one telling and twenty-two in another.\n\nThe earliest surviving text is the copy in Sidney Gilbert\'s notebook, made around June 1833, roughly four months after the date of the revelation.'},
    {cat:'revelations', y:1836, m:4, d:3, title:'Visions in the Kirtland Temple', people:['Oliver Cowdery'], desc:'A week after the temple\'s dedication, JS and Oliver Cowdery report visions behind the lowered veils of the west pulpits — of Jesus Christ accepting the house, and of Moses, Elias and Elijah conferring priesthood keys. Later canonized as Doctrine and Covenants 110.', sources:[
      {text:'Visions, 3 April 1836 [D&C 110] — recorded in JS\'s journal, pp. 192–193, in the handwriting of Warren A. Cowdery', url:'https://www.josephsmithpapers.org/paper-summary/visions-3-april-1836-dc-110/1'},
      {text:'Minutes and Prayer of Dedication, 27 March 1836 [D&C 109] — the dedication a week earlier, at which JS prayed that Christ would manifest himself in the house', url:'https://www.josephsmithpapers.org/paper-summary/minutes-and-prayer-of-dedication-27-march-1836-dc-109'}
    ], researchNotes:'Date corrected from 27 March to 3 April 1836. The 27 March date belongs to the temple\'s dedication (D&C 109), which is recorded separately under Church History; the Joseph Smith Papers date these visions a week later.\n\nOn authorship: veils were lowered enclosing the west pulpits, and JS and Oliver Cowdery were secluded behind them. The journal entry was written by Warren A. Cowdery — JS\'s scribe and Oliver Cowdery\'s brother — who was not among the two participants. The Joseph Smith Papers states he recorded it "sometime shortly after" and may have worked from an earlier text no longer extant, or from oral reports by one or both participants. He wrote it in the third person, in contrast to the first-person language used elsewhere in that journal. Neither participant left a firsthand written account at the time; the other near-contemporary record, a letter William W. Phelps wrote to his wife that month describing "a manifestation of the Lord" to JS and Cowdery, is likewise by a non-participant. Willard Richards recast the journal account into the first person by 7 November 1843 for JS\'s multivolume history, and that first-person version was added to the Doctrine and Covenants in 1876.\n\nNo first-recorded date is set on this entry: the earliest known account was written within days of the event, so it is not retrospective in the sense that field tracks. The 1843 recasting is a later version of an already-existing record rather than the first one.'},
    {cat:'revelations', y:1838, m:4, d:26, title:'Revelation on the church\'s official name', people:[], desc:'A revelation dictated at Far West, Missouri, names the church "The Church of Jesus Christ of Latter Day Saints," directs continued gathering to Far West, and commands a temple be built there. Later canonized as Doctrine and Covenants 115.', sources:[
      {text:'Revelation, 26 April 1838 [D&C 115] — copied into JS\'s journal (the "Scriptory Book"), pp. 32–34, in the handwriting of George W. Robinson', url:'https://www.josephsmithpapers.org/paper-summary/revelation-26-april-1838-dc-115/1'},
      {text:'"An Extract of Revelation," Elders\' Journal, Aug. 1838, 52–53 — the revelation as published in the church\'s own newspaper', url:'https://www.josephsmithpapers.org/paper-summary/elders-journal-august-1838/4'}
    ], researchNotes:'George W. Robinson inscribed the revelation in JS\'s journal at or near the time it was dictated; the Joseph Smith Papers notes the journal appears to have been kept regularly from this entry onward, placing the inscription in late April or early May 1838. The revelation was probably dictated orally to a scribe, as was typical of JS\'s revelations. The name it gives is spelled "Latter Day Saints" in the manuscript; the hyphenated "Latter-day Saints" is a later standardisation.'},
    {cat:'revelations', y:1841, m:1, d:19, title:'Revelation directing a baptismal font', people:[], desc:'A revelation designates Nauvoo a cornerstone of Zion and calls for a temple, directing that a font be built so that baptisms for the dead may be performed in the house rather than outside it. Later canonized as Doctrine and Covenants 124.', sources:[
      {text:'Revelation, 19 January 1841 [D&C 124], p. 5 — the passage directing the font: "For a baptismal font there is not upon the earth, that they, my saints, may be baptized for those who are dead"', url:'https://www.josephsmithpapers.org/paper-summary/revelation-19-january-1841-dc-124/3'}
    ], researchNotes:'The revelation\'s own language indicates the ordinance was already being performed before this date, outside a temple, and was now to belong to the house: it permits the practice away from a house "only in the days of your poverty, wherein ye are not able to build a house unto me."\n\nThe Joseph Smith Papers records that a temporary wooden font was dedicated in the basement of the unfinished temple on 8 November 1841, so the direction given in January was acted on within the year.\n\nThis entry covers the practice and the font; the separate entry of September 1842 covers its regulation — the requirement that baptisms be witnessed and recorded — which is a distinct development.'},
    {cat:'revelations', y:1842, m:9, d:7, title:'Baptism for the dead formalized', people:[], desc:'Two letters to the church set out requirements for witnessing and recording baptisms for the dead and give the practice its fullest doctrinal statement. Later canonized as Doctrine and Covenants 127 and 128.', sources:[
      {text:'Letter to the Church, 7 September 1842 [D&C 128] — expands the instructions of the letter a week earlier and sets out the doctrine at length', url:'https://www.josephsmithpapers.org/paper-summary/letter-to-the-church-of-jesus-christ-of-latter-day-saints-6-september-1842-dc-128/7'},
      {text:'Letter to "All the Saints in Nauvoo," 1 September 1842 [D&C 127] — instructs that a recorder witness each baptism, and promises further instruction; printed in the Times and Seasons, 15 Sept. 1842'}
    ], researchNotes:'Date moved from an approximate 1841 to 7 September 1842. The 1841 material — the revelation directing a font, and the font\'s dedication that November — is now carried by its own entry, since the introduction of the practice and its later regulation are distinct developments a year and a half apart.\n\nWhat the September 1842 letters supply is the formalisation this entry describes: the requirement that a recorder witness and register each baptism, and the extended doctrinal exposition. The Joseph Smith Papers records that after the 7 September letter was read publicly on 11 September 1842, baptisms resumed at the font that evening and entries began to be recorded that night.\n\nThe second citation above is given without a link because that document was not among those verified.'},
    {cat:'revelations', y:1843, m:7, d:12, title:'Revelation on eternal marriage recorded', people:['Emma Hale Smith'], desc:'A written revelation on eternal and plural marriage is dictated at Nauvoo and taken down by William Clayton. Later canonized as Doctrine and Covenants 132.', sources:[
      {text:'Revelation, 12 July 1843 [D&C 132] — the Joseph Smith Papers annotation draws on William Clayton\'s journal and his 1874 affidavit for the circumstances of the dictation', url:'https://www.josephsmithpapers.org/paper-summary/revelation-12-july-1843-dc-132/1'}
    ], researchNotes:'The same document is cited from the Personal Life entry on plural marriage within the inner circle; the two entries approach it from different threads and share the citation.\n\nOn provenance: the account of the dictation itself comes from William Clayton, who wrote it down. His journal is contemporary; the affidavit elaborating on the circumstances dates to 1874, thirty-one years afterwards. The revelation was not published during JS\'s lifetime.'},

    // ---- Church History ----
    {cat:'church', y:1830, m:4, d:6, title:'Church of Christ organized', people:['Oliver Cowdery','David Whitmer'], desc:'The church is formally organized, with JS and Oliver Cowdery ordaining one another as elders before a meeting of baptized believers.', sources:[
      {text:'Revelation, 6 April 1830 [D&C 21] — dictated the day the church was organized; copied into Revelation Book 1 circa March 1831', url:'https://www.josephsmithpapers.org/paper-summary/revelation-6-april-1830-dc-21/1'},
      {text:'Articles and Covenants, circa April 1830 [D&C 20:2\u20133] — states that JS and Cowdery ordained each other elders in the church', url:'https://www.josephsmithpapers.org/paper-summary/articles-and-covenants-circa-april-1830-dc-20/1'},
      {text:'Joseph Smith, History, 1838\u20131856, vol. A-1, p. 37 \u2014 account of the 6 April 1830 meeting', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-a-1-23-december-1805-30-august-1834/43'}
    ], researchNotes:'The revelation of 6 April 1830 is contemporary with the organization; the surviving copy was inscribed in Revelation Book 1 about eleven months later. The Articles and Covenants, which describe the mutual ordination, date to about the same period and were published in the Painesville Telegraph in April 1831. The narrative in JS\'s manuscript history was composed from 1838 onward.'},
    {cat:'church', y:1831, m:1, approx:true, title:'Headquarters shifts to Kirtland, Ohio', people:['Sidney Rigdon'], desc:'Church members in New York are directed by revelation to gather to Ohio, and Kirtland becomes the church\'s first major center.', sources:[
      {text:'Revelation, 30 December 1830 [D&C 37] \u2014 dictated near Fayette, New York, directing the move to Ohio', url:'https://www.josephsmithpapers.org/paper-summary/revelation-30-december-1830-dc-37/1'}
    ], researchNotes:'The same document is cited from the Personal Life entry on the family\'s relocation to Kirtland; the two entries approach the move from different threads and share the citation. The revelation is dated 30 December 1830 and the gathering followed over the early months of 1831, which is why this entry carries an approximate January 1831 date rather than the date of the document.'},
    {cat:'church', y:1831, m:7, d:20, title:'Independence, Missouri designated as Zion', people:[], desc:'A revelation identifies Missouri as the land of Zion and Independence as the "centre place," where a city and temple are to be built. Later canonized as Doctrine and Covenants 57.', sources:[
      {text:'Revelation, 20 July 1831 [D&C 57:1\u20133] \u2014 designates Missouri as the land of Zion and Independence as the centre place', url:'https://www.josephsmithpapers.org/paper-summary/revelation-20-july-1831-dc-57'}
    ], researchNotes:'Date made specific: the revelation is dated 20 July 1831, where the entry previously carried an approximate July. This designation is the reference point for later entries that describe the Saints being driven from Jackson County and, in 1838, being commanded to build a city of Zion at Far West instead \u2014 the Joseph Smith Papers notes that the 1838 revelation marked a change in plan, since Far West was not the "centre place" named here.'},
    {cat:'church', y:1834, m:5, d:5, title:'Zion\'s Camp expedition departs', people:['Brigham Young'], desc:'An expedition of roughly 205 men and about 20 women and children marches from Ohio to Missouri to help Saints driven from Jackson County regain their lands. Known at the time as the Camp of Israel.', sources:[
      {text:'Revelation, 24 February 1834 [D&C 103] \u2014 directs the recruitment of up to five hundred men to go to Missouri; featured copy in Orson Pratt\'s handwriting, made within weeks', url:'https://www.josephsmithpapers.org/paper-summary/revelation-24-february-1834-dc-103/1'},
      {text:'Minutes, 24 February 1834 \u2014 the Kirtland high council meeting the same day, at which JS volunteered to lead the expedition and was appointed "Commander in Chief of the Armies of Israel"', url:'https://www.josephsmithpapers.org/paper-summary/minutes-24-february-1834'}
    ], researchNotes:'Date made specific: JS departed Kirtland with most of the volunteers on 5 May 1834, where the entry previously carried an approximate May. A second contingent under Hyrum Smith and Lyman Wight left Michigan Territory the same day; the two joined on 9 June at the Salt River settlement in Missouri.\n\nThe Joseph Smith Papers notes that extant records do not establish whether the revelation was dictated before, during, or after the high council meeting of the same day, so it cannot be determined from the documents whether it prompted the decision to march or affirmed a decision already taken.\n\nThe camp disbanded without regaining the Jackson County lands, its dispersal hastened by an outbreak of cholera.'},
    {cat:'church', y:1835, m:2, d:14, title:'Quorum of the Twelve Apostles organized', people:['Brigham Young'], desc:'At a conference in Kirtland, the Three Witnesses to the Book of Mormon choose twelve men as apostles, who are then ordained \u2014 acting on a revelation of June 1829 that had directed the choosing of twelve.', sources:[
      {text:'Minutes, 14 February 1835 \u2014 the record of the conference and the list of the twelve chosen; copied into the "Record of the Transactions of the Twelve" in Orson Hyde\'s handwriting', url:'https://www.josephsmithpapers.org/paper-summary/minutes-14-february-1835/1'},
      {text:'Record of the Twelve, 14 February\u201328 August 1835 \u2014 the quorum\'s own record, opening with its organization', url:'https://www.josephsmithpapers.org/paper-summary/record-of-the-twelve-14-february-28-august-1835/7'}
    ], researchNotes:'The minutes were copied into the record book between about 27 February and 2 May 1835, within roughly three months of the meeting, in the handwriting of Orson Hyde \u2014 himself one of the twelve chosen that day, so a participant rather than an outside scribe.\n\nThe minutes state the twelve were chosen and ordained by the Three Witnesses (Oliver Cowdery, David Whitmer and Martin Harris). Heber C. Kimball, also among the twelve, recorded that the First Presidency then laid hands on them to confirm the blessings and ordination; his journal account was written circa 1842\u20131858.'},
    {cat:'church', y:1836, m:3, d:27, title:'Kirtland Temple dedicated', people:[], desc:'The church\'s first temple is completed and dedicated, with a dedicatory prayer later canonized as Doctrine and Covenants 109.', sources:[
      {text:'Minutes and Prayer of Dedication, 27 March 1836 [D&C 109] \u2014 the dedication service and prayer', url:'https://www.josephsmithpapers.org/paper-summary/minutes-and-prayer-of-dedication-27-march-1836-dc-109'}
    ], researchNotes:'The dedicatory prayer asks that the house be a place where the Son of Man would manifest himself to his people. The visions reported a week later, on 3 April, are recorded as a separate entry under Revelations & Scripture; the two had previously been merged under this date.'},
    {cat:'church', y:1837, m:1, d:2, title:'Kirtland Safety Society founded', people:['Sidney Rigdon'], desc:'A church-affiliated financial institution is founded at Kirtland amid a real-estate and currency boom, after the Ohio legislature declined to grant a banking charter.', sources:[
      {text:'Articles of Agreement for the Kirtland Safety Society Anti-Banking Company, 2 January 1837 \u2014 the institution\'s founding document', url:'https://www.josephsmithpapers.org/paper-summary/articles-of-agreement-for-the-kirtland-safety-society-anti-banking-company-2-january-1837/3'},
      {text:'Introduction to the Kirtland Safety Society \u2014 the Joseph Smith Papers documentary account of its founding, operation and failure', url:'https://www.josephsmithpapers.org/paper-summary/introduction-to-the-kirtland-safety-society/1'}
    ], researchNotes:'Date made specific to the date of the founding document, 2 January 1837, where the entry previously carried an approximate January. The same two documents are cited from the Acquaintances entry on the falling-out that followed the society\'s failure.\n\nThe name in the founding document is "Anti-Banking Company," reflecting that the institution operated without the banking charter the legislature had refused.'},
    {cat:'church', y:1838, m:4, d:26, title:'Church officially renamed', people:[], desc:'The revelation dictated at Far West gives the church its official name, "The Church of Jesus Christ of Latter Day Saints."', sources:[
      {text:'Revelation, 26 April 1838 [D&C 115] \u2014 copied into JS\'s journal (the "Scriptory Book") in the handwriting of George W. Robinson', url:'https://www.josephsmithpapers.org/paper-summary/revelation-26-april-1838-dc-115/1'}
    ], researchNotes:'The same document is cited from the Revelations & Scripture entry, which treats it as a revelation; this entry treats the naming as an institutional event. The manuscript spells the name "Latter Day Saints"; the hyphenated form is a later standardisation.'},
    {cat:'church', y:1838, m:11, approx:true, title:'Saints expelled from Missouri', people:[], desc:'Following armed conflict and the state\'s extermination order, church members surrender at Far West and begin leaving Missouri, most crossing into Illinois over the winter of 1838\u201339.', sources:[
      {text:'Joseph Smith, History, 1838\u20131856, vol. B-1 [1 Sept. 1834\u20132 Nov. 1838] \u2014 JS\'s manuscript history covering the Missouri conflict to the surrender at Far West', url:'https://www.josephsmithpapers.org/paper-summary/history-1838-1856-volume-b-1-1-september-1834-2-november-1838/1'},
      {text:'Joseph Smith et al., Letter to the Church and Edward Partridge, 20 March 1839 \u2014 written from Liberty Jail during the expulsion', url:'https://www.josephsmithpapers.org/paper-summary/letter-to-the-church-and-edward-partridge-20-march-1839/1'}
    ], researchNotes:'The expulsion was a process rather than a single event, running from the surrender at Far West at the start of November 1838 through the following winter, which is why this entry carries an approximate date.\n\nThe order that prompted it \u2014 Governor Lilburn Boggs\'s Executive Order 44 of 27 October 1838 \u2014 is recorded separately under Local & Regional Events, as a state action rather than a church one. JS\'s manuscript history of this period was composed from 1838 onward, in part while he was imprisoned; the Liberty Jail letter is contemporary with the expulsion itself.'},
    {cat:'church', y:1839, m:5, approx:true, title:'Nauvoo, Illinois founded', people:[], desc:'After the expulsion from Missouri, the church purchases land at Commerce on a bend of the Mississippi; the settlement is renamed Nauvoo and becomes the new gathering place.', sources:[
